<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Feedback Admin – Celeste Harbor</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#050811;
      --panel:#111623;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --dim:#747f96;
      --line:#252b3a;
      --accent:#a9b7ff;
      --danger:#ff9b9b;
      --ready:#b9f6ca;
      --warn:#ffe3a3;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top,#1a2440 0,#0b1020 34%,var(--bg) 68%),
        linear-gradient(180deg,#050811 0%,#03050b 100%);
      color:var(--text);
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      padding:40px 20px;
    }

    body.auth-locked .wrap{
      visibility:hidden;
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
    }

    .site-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      margin-bottom:44px;
      color:var(--muted);
      font-size:13px;
    }

    .brand{
      color:var(--text);
      letter-spacing:.04em;
      text-decoration:none;
    }

    .nav{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      align-items:center;
    }

    .nav a{
      color:var(--muted);
      text-decoration:none;
    }

    .nav a:hover{
      color:var(--text);
    }

    .logout-link{
      color:var(--muted);
      text-decoration:none;
      cursor:pointer;
    }

    .logout-link:hover{
      color:var(--text);
    }

    h1{
      font-size:34px;
      font-weight:500;
      line-height:1.7;
      margin:0 0 12px;
    }

    .lead{
      color:var(--muted);
      line-height:2;
      font-size:14px;
      margin:0 0 28px;
    }

    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:20px;
    }

    .admin-notice-panel{
      margin:0 0 24px;
      padding:20px;
      border-radius:20px;
      border:1px solid rgba(70,84,132,.55);
      background:
        radial-gradient(circle at top left, rgba(169,183,255,.08), transparent 44%),
        rgba(10,14,28,.78);
      box-shadow:0 18px 42px rgba(0,0,0,.28);
    }

    .admin-notice-details{
      margin:0 0 24px;
    }

    .admin-notice-details summary{
      list-style:none;
      cursor:pointer;
      user-select:none;
    }

    .admin-notice-details summary::-webkit-details-marker{
      display:none;
    }

    .admin-notice-summary{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      padding:16px 18px;
      border-radius:18px;
      border:1px solid rgba(70,84,132,.55);
      background:
        radial-gradient(circle at top left, rgba(169,183,255,.08), transparent 44%),
        rgba(10,14,28,.78);
      box-shadow:0 18px 42px rgba(0,0,0,.28);
    }

    .admin-notice-summary-title{
      color:var(--text);
      font-size:15px;
      line-height:1.7;
    }

    .admin-notice-summary-note{
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
      margin-top:2px;
    }

    .admin-notice-summary-mark{
      color:var(--accent);
      font-size:12px;
      white-space:nowrap;
    }

    .admin-notice-details[open] .admin-notice-summary{
      border-color:rgba(169,183,255,.55);
    }

    .admin-notice-details[open] .admin-notice-summary-mark{
      color:var(--ready);
    }

    .admin-notice-details[open] .admin-notice-summary-mark::before{
      content:"閉じる";
    }

    .admin-notice-details:not([open]) .admin-notice-summary-mark::before{
      content:"開く";
    }

    .admin-notice-details .admin-notice-panel{
      margin:12px 0 24px;
    }

    .admin-notice-title{
      font-size:16px;
      line-height:1.7;
      margin:0 0 4px;
      font-weight:500;
    }

    .admin-notice-note{
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
      margin:0 0 16px;
    }

    .admin-notice-grid{
      display:grid;
      grid-template-columns:180px minmax(0, 1fr);
      gap:12px;
      align-items:center;
      margin-bottom:12px;
    }

    .admin-notice-field{
      display:grid;
      gap:6px;
      margin-bottom:12px;
    }

    .admin-notice-field label{
      color:var(--dim);
      font-size:11px;
      letter-spacing:.10em;
      text-transform:uppercase;
    }

    .admin-notice-input,
    .admin-notice-textarea{
      width:100%;
      border-radius:16px;
      border:1px solid rgba(160,168,187,.25);
      background:rgba(5,8,17,.82);
      color:var(--text);
      padding:12px;
      font-family:inherit;
      font-size:13px;
      line-height:1.8;
      outline:none;
    }

    .admin-notice-input{
      border-radius:999px;
    }

    .admin-notice-textarea{
      min-height:130px;
      resize:vertical;
    }

    .admin-notice-input:focus,
    .admin-notice-textarea:focus{
      border-color:rgba(169,183,255,.65);
    }

    .admin-notice-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:14px;
    }

    .selected-user-preview{
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
      min-height:1.8em;
    }

    select{
      background:rgba(5,8,17,.85);
      border:1px solid rgba(160,168,187,.25);
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-family:inherit;
      font-size:13px;
      outline:none;
    }

    button{
      border:0;
      border-radius:999px;
      padding:10px 16px;
      font-family:inherit;
      font-size:13px;
      cursor:pointer;
    }

    .primary{
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
    }

    .ghost{
      background:transparent;
      color:var(--muted);
      border:1px solid var(--line);
    }

    button:hover{
      opacity:.92;
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .status{
      color:var(--muted);
      font-size:13px;
      line-height:1.9;
      margin-bottom:18px;
      min-height:1.9em;
    }

    .status.error{
      color:var(--danger);
    }

    .feedback-list{
      display:grid;
      gap:16px;
    }

    .feedback-card{
      background:rgba(10,14,28,.82);
      border:1px solid rgba(70,84,132,.55);
      border-radius:18px;
      padding:20px;
      box-shadow:0 18px 42px rgba(0,0,0,.34);
    }

    .feedback-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      margin-bottom:12px;
    }

    .feedback-meta{
      color:var(--dim);
      font-size:12px;
      line-height:1.8;
    }

    .feedback-type{
      display:inline-block;
      margin-bottom:6px;
      color:var(--accent);
      font-size:11px;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .feedback-message{
      white-space:pre-wrap;
      line-height:1.9;
      font-size:14px;
      color:var(--text);
      margin:12px 0 14px;
    }

    .feedback-path{
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
      word-break:break-all;
      border-top:1px solid rgba(160,168,187,.12);
      padding-top:12px;
      margin-top:12px;
    }

    .admin-reply-box{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid rgba(160,168,187,.12);
    }
    
    .admin-reply-label{
      display:block;
      color:var(--accent);
      font-size:12px;
      letter-spacing:.12em;
      margin-bottom:8px;
    }
    
    .admin-reply-textarea{
      width:100%;
      min-height:120px;
      resize:vertical;
      border-radius:14px;
      border:1px solid rgba(160,168,187,.25);
      background:rgba(5,8,17,.82);
      color:var(--text);
      padding:12px;
      font-family:inherit;
      font-size:13px;
      line-height:1.8;
      outline:none;
    }
    
    .admin-reply-textarea:focus{
      border-color:rgba(169,183,255,.65);
    }
    
    .admin-reply-meta{
      margin-top:8px;
      color:var(--dim);
      font-size:12px;
      line-height:1.8;
    }

    .badge{
      display:inline-block;
      border-radius:999px;
      border:1px solid rgba(160,168,187,.28);
      color:var(--muted);
      font-size:12px;
      padding:5px 10px;
      background:rgba(255,255,255,.02);
      white-space:nowrap;
    }

    .badge.open{
      color:var(--warn);
      border-color:rgba(255,227,163,.36);
      background:rgba(255,227,163,.06);
    }

    .badge.reviewing{
      color:var(--accent);
      border-color:rgba(169,183,255,.36);
      background:rgba(169,183,255,.06);
    }

    .badge.closed{
      color:var(--ready);
      border-color:rgba(185,246,202,.36);
      background:rgba(185,246,202,.06);
    }

    .feedback-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .empty{
      padding:24px;
      border:1px solid rgba(70,84,132,.45);
      border-radius:18px;
      color:var(--muted);
      line-height:2;
      background:rgba(10,14,28,.62);
    }

    footer{
      margin-top:40px;
      padding-top:18px;
      border-top:1px solid rgba(37,43,58,.9);
      color:var(--muted);
      font-size:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:14px;
    }

    .footer-links{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    footer a{
      color:var(--muted);
      text-decoration:none;
    }

    footer a:hover{
      color:var(--text);
    }

    @media(max-width:640px){
      body{
        padding:28px 16px;
      }

      .admin-notice-grid{
        grid-template-columns:1fr;
      }

      .admin-notice-actions button{
        width:100%;
      }

      .site-header{
        align-items:flex-start;
        flex-direction:column;
        margin-bottom:34px;
      }

      .nav{
        gap:12px;
        font-size:12px;
      }

      h1{
        font-size:30px;
      }

      .feedback-top{
        flex-direction:column;
      }

      .toolbar select,
      .toolbar button{
        width:100%;
      }

      .feedback-actions button{
        width:100%;
      }
    }
  </style>
</head>

<body class="auth-locked">
  <div class="wrap">

    <header class="site-header">
      <a class="brand" href="/">Celeste Harbor</a>

      <nav class="nav">
        <a href="/admin/">管理入口</a>
        <a href="/admin/users/">ユーザー管理</a>
        <a href="/admin/billing/">課金管理</a>
        <a href="/admin/feedback/">便り管理</a>
        <a href="#" class="logout-link" id="logoutLink">ログアウト</a>
      </nav>
    </header>

    <main>
      <h1>Harbor Letter Admin</h1>

      <p class="lead">
        港へ届いた便りを確認します。<br>
        不具合報告、違和感、改善要望をここで整理できます。
      </p>

      <div class="toolbar">
        <select id="statusFilter">
          <option value="open">未確認</option>
          <option value="reviewing">確認中</option>
          <option value="closed">対応済み</option>
          <option value="all">すべて</option>
        </select>

        <button class="ghost" id="refreshBtn" type="button">
          更新
        </button>
      </div>

            <details class="admin-notice-details">
        <summary>
          <div class="admin-notice-summary">
            <div>
              <div class="admin-notice-summary-title">管理者からのお知らせ</div>
              <div class="admin-notice-summary-note">
                全ユーザーまたは選択ユーザーへ、サイト内通知を送ります。
              </div>
            </div>
            <div class="admin-notice-summary-mark" aria-hidden="true"></div>
          </div>
        </summary>

        <section class="admin-notice-panel" aria-label="管理者からのお知らせ">
          <h2 class="admin-notice-title">管理者からのお知らせを作成</h2>
          <p class="admin-notice-note">
            サイト内通知として、選択ユーザーまたは全ユーザーへお知らせを送ります。メール送信は行いません。
          </p>

          <div class="admin-notice-grid">
            <select id="noticeTargetType">
              <option value="selected">選択ユーザー</option>
              <option value="all">全ユーザー</option>
            </select>

            <select id="noticeUserSelect">
              <option value="">ユーザーを読み込んでいます</option>
            </select>
          </div>

          <div class="selected-user-preview" id="selectedUserPreview">
            送信先ユーザーを選択してください。
          </div>

          <div class="admin-notice-field">
            <label for="noticeTitleInput">Title</label>
            <input
              class="admin-notice-input"
              id="noticeTitleInput"
              type="text"
              placeholder="お知らせのタイトル"
            />
          </div>

          <div class="admin-notice-field">
            <label for="noticeMessageInput">Message</label>
            <textarea
              class="admin-notice-textarea"
              id="noticeMessageInput"
              placeholder="ユーザーに表示するお知らせ本文を書きます。"
            ></textarea>
          </div>

          <div class="admin-notice-actions">
            <button class="primary" id="sendNoticeBtn" type="button">
              お知らせを送信
            </button>
            <button class="ghost" id="clearNoticeBtn" type="button">
              入力をクリア
            </button>
          </div>
        </section>
      </details>

      <div class="status" id="status"></div>

      <div class="feedback-list" id="feedbackList"></div>
    </main>

    <footer>
      <div class="footer-links">
        <a href="/admin/">管理入口</a>
        <a href="/admin/users/">ユーザー管理</a>
        <a href="/admin/billing/">課金管理</a>
        <a href="/admin/feedback/">便り管理</a>
      </div>

      <div>CELESTE HARBOR ADMIN</div>
    </footer>

  </div>

  <script>
    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const ADMIN_USER_ID = "72667f4c-ae4e-46fa-ab6f-468cb198e6ad";

    const client = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

    const statusEl = document.getElementById("status");
    const feedbackList = document.getElementById("feedbackList");
    const statusFilter = document.getElementById("statusFilter");
    const refreshBtn = document.getElementById("refreshBtn");
    const logoutLink = document.getElementById("logoutLink");

    const adminNoticeDetails = document.querySelector(".admin-notice-details");
    const noticeTargetType = document.getElementById("noticeTargetType");
    const noticeUserSelect = document.getElementById("noticeUserSelect");
    const selectedUserPreview = document.getElementById("selectedUserPreview");
    const noticeTitleInput = document.getElementById("noticeTitleInput");
    const noticeMessageInput = document.getElementById("noticeMessageInput");
    const sendNoticeBtn = document.getElementById("sendNoticeBtn");
    const clearNoticeBtn = document.getElementById("clearNoticeBtn");

    let currentUser = null;
    let adminUsers = [];

    function setStatus(message, isError = false){
      statusEl.textContent = message || "";
      statusEl.className = isError ? "status error" : "status";
    }

    function escapeHtml(str){
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDate(value){
      if(!value){
        return "";
      }

      const date = new Date(value);

      return date.toLocaleString("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function typeLabel(type){
      if(type === "bug") return "不具合報告";
      if(type === "feedback") return "表示や文言の違和感";
      if(type === "request") return "改善要望";
      if(type === "other") return "その他";
      return type || "feedback";
    }

    function statusLabel(status){
      if(status === "open") return "未確認";
      if(status === "reviewing") return "確認中";
      if(status === "closed") return "対応済み";
      return status || "未確認";
    }

    async function fetchAdminUsers(searchTerm = ""){
      const { data: sessionData } = await client.auth.getSession();
      const accessToken = sessionData.session?.access_token || "";

      if(!accessToken){
        throw new Error("管理者ログイン情報を確認できませんでした。");
      }

      const url = new URL(supabaseUrl + "/functions/v1/admin-list-users");

      if(searchTerm){
        url.searchParams.set("q", searchTerm);
      }

      const response = await fetch(url.toString(), {
        method:"GET",
        headers:{
          "Authorization":"Bearer " + accessToken,
          "Content-Type":"application/json"
        }
      });

      const result = await response.json().catch(function(){
        return {};
      });

      if(!response.ok){
        throw new Error(result.error || "ユーザー一覧を取得できませんでした。");
      }

      adminUsers = Array.isArray(result.users) ? result.users : [];

      return adminUsers;
    }

    function renderNoticeUsers(users){
      noticeUserSelect.innerHTML = "";

      if(!users || users.length === 0){
        noticeUserSelect.innerHTML = '<option value="">ユーザーがいません</option>';
        updateNoticeTargetState();
        return;
      }

      const firstOption = document.createElement("option");
      firstOption.value = "";
      firstOption.textContent = "送信先ユーザーを選択";
      noticeUserSelect.appendChild(firstOption);

      users.forEach(function(user){
        const option = document.createElement("option");
        option.value = user.user_id;

        const displayName = user.display_name || "名前未設定";
        const email = user.email || "";
        option.textContent = displayName + " / " + email;

        noticeUserSelect.appendChild(option);
      });

      updateNoticeTargetState();
    }

    function updateNoticeTargetState(){
      const targetType = noticeTargetType.value;

      if(targetType === "all"){
        noticeUserSelect.disabled = true;
        selectedUserPreview.textContent = "送信対象：全ユーザー";
        return;
      }

      noticeUserSelect.disabled = false;

      const selectedUser = adminUsers.find(function(user){
        return user.user_id === noticeUserSelect.value;
      });

      if(!selectedUser){
        selectedUserPreview.textContent = "送信先ユーザーを選択してください。";
        return;
      }

      selectedUserPreview.textContent =
        "送信対象：" +
        (selectedUser.display_name || "名前未設定") +
        " / " +
        (selectedUser.email || selectedUser.user_id);
    }

    function clearNoticeForm(){
      noticeTargetType.value = "selected";
      noticeUserSelect.value = "";
      noticeTitleInput.value = "";
      noticeMessageInput.value = "";
      updateNoticeTargetState();
    }

    function renderFeedback(rows){
      feedbackList.innerHTML = "";

      if(!rows || rows.length === 0){
        feedbackList.innerHTML = `
          <div class="empty">
            現在、この条件に合う便りはありません。
          </div>
        `;
        return;
      }

      rows.forEach((row) => {
        const card = document.createElement("article");
        card.className = "feedback-card";

        const status = row.status || "open";

        card.innerHTML = `
          <div class="feedback-top">
            <div>
              <div class="feedback-type">${escapeHtml(typeLabel(row.type))}</div>
              <div class="feedback-meta">
                ${escapeHtml(formatDate(row.created_at))}<br>
                user_id: ${escapeHtml(row.user_id || "")}
              </div>
            </div>

            <span class="badge ${escapeHtml(status)}">
              ${escapeHtml(statusLabel(status))}
            </span>
          </div>

          <div class="feedback-message">${escapeHtml(row.message)}</div>

          <div class="feedback-path">
            page: ${escapeHtml(row.page_path || "")}<br>
            browser: ${escapeHtml(row.user_agent || "")}
          </div>

          <div class="admin-reply-box">
            <label class="admin-reply-label" for="reply-${escapeHtml(row.id)}">
              ユーザーへの返信
            </label>
          
            <textarea
              class="admin-reply-textarea"
              id="reply-${escapeHtml(row.id)}"
              data-reply-id="${escapeHtml(row.id)}"
              placeholder="ユーザーに表示する返信を書きます。"
            >${escapeHtml(row.admin_reply || "")}</textarea>
          
            <div class="admin-reply-meta">
              ${
                row.replied_at
                  ? "返信日時：" + escapeHtml(formatDate(row.replied_at))
                  : "まだ返信は保存されていません。"
              }
            </div>
          </div>

          <div class="feedback-actions">
            <button class="primary" type="button" data-reply-save="${escapeHtml(row.id)}">
              返信を保存
            </button>
            
            <button class="ghost" type="button" data-action="reviewing" data-id="${escapeHtml(row.id)}">
              確認中にする
            </button>
            
            <button class="ghost" type="button" data-action="closed" data-id="${escapeHtml(row.id)}">
              対応済みにする
            </button>
            
            <button class="ghost" type="button" data-action="open" data-id="${escapeHtml(row.id)}">
              未確認に戻す
            </button>
          </div>
        `;

        feedbackList.appendChild(card);
      });

      feedbackList.querySelectorAll("button[data-action]").forEach((button) => {
        button.addEventListener("click", async () => {
          const id = button.getAttribute("data-id");
          const nextStatus = button.getAttribute("data-action");

          await updateFeedbackStatus(id, nextStatus);
        });
      });

      feedbackList.querySelectorAll("button[data-reply-save]").forEach((button) => {
        button.addEventListener("click", async () => {
          const id = button.getAttribute("data-reply-save");
          const textarea = feedbackList.querySelector(
            'textarea[data-reply-id="' + id + '"]'
          );
      
          const reply = textarea ? textarea.value.trim() : "";
      
          await saveAdminReply(id, reply);
        });
      });
    }

    async function loadFeedback(){
      if(!currentUser){
        return;
      }

      if(currentUser.id !== ADMIN_USER_ID){
        setStatus("このページを表示する権限がありません。", true);
        feedbackList.innerHTML = "";
        return;
      }

      setStatus("港への便りを読み込んでいます。");
      refreshBtn.disabled = true;

      let query = client
        .from("user_feedback")
        .select("id,user_id,type,message,page_path,user_agent,status,admin_reply,replied_at,created_at")
        .order("created_at", { ascending: false })
        .limit(100);

      const selectedStatus = statusFilter.value;

      if(selectedStatus !== "all"){
        query = query.eq("status", selectedStatus);
      }

      const { data, error } = await query;

      refreshBtn.disabled = false;

      if(error){
        console.error(error);
        setStatus("便りを読み込めませんでした。権限またはRLS設定を確認してください。", true);
        return;
      }

      setStatus(data.length + " 件の便りを表示しています。");
      renderFeedback(data);
    }

    async function sendAdminNotice(){
      if(!currentUser || currentUser.id !== ADMIN_USER_ID){
        setStatus("この操作を行う権限がありません。", true);
        return;
      }

      const targetType = noticeTargetType.value;
      const title = noticeTitleInput.value.trim();
      const message = noticeMessageInput.value.trim();

      if(!title){
        setStatus("お知らせのタイトルを入力してください。", true);
        return;
      }

      if(!message){
        setStatus("お知らせ本文を入力してください。", true);
        return;
      }

      let targetUsers = [];

      if(targetType === "all"){
        targetUsers = adminUsers.filter(function(user){
          return Boolean(user.user_id);
        });
      }else{
        const selectedUserId = noticeUserSelect.value;

        if(!selectedUserId){
          setStatus("送信先ユーザーを選択してください。", true);
          return;
        }

        const selectedUser = adminUsers.find(function(user){
          return user.user_id === selectedUserId;
        });

        if(!selectedUser){
          setStatus("送信先ユーザーを確認できませんでした。", true);
          return;
        }

        targetUsers = [selectedUser];
      }

      if(targetUsers.length === 0){
        setStatus("送信対象ユーザーがいません。", true);
        return;
      }

      const confirmMessage =
        targetType === "all"
          ? "全ユーザー " + targetUsers.length + " 人にお知らせを送信します。よろしいですか？"
          : "選択ユーザーにお知らせを送信します。よろしいですか？";

      if(!window.confirm(confirmMessage)){
        return;
      }

      setStatus("お知らせを送信しています。");
      sendNoticeBtn.disabled = true;

      const { data: announcement, error: announcementError } = await client
        .from("admin_announcements")
        .insert({
          title,
          message,
          target_type: targetType,
          created_by: currentUser.id
        })
        .select("id")
        .single();

      if(announcementError){
        console.error(announcementError);
        setStatus("お知らせ本文を保存できませんでした。RLS設定を確認してください。", true);
        sendNoticeBtn.disabled = false;
        return;
      }

      const recipientRows = targetUsers.map(function(user){
        return {
          announcement_id: announcement.id,
          user_id: user.user_id
        };
      });

      const { error: recipientsError } = await client
        .from("admin_announcement_recipients")
        .insert(recipientRows);

      sendNoticeBtn.disabled = false;

      if(recipientsError){
        console.error(recipientsError);
        setStatus("送信先ユーザーを保存できませんでした。RLS設定を確認してください。", true);
        return;
      }

      setStatus("お知らせを送信しました。対象：" + targetUsers.length + " 人");
      clearNoticeForm();

      if(adminNoticeDetails){
        adminNoticeDetails.open = false;
      }
    }

    async function saveAdminReply(id, reply){
      if(!id){
        return;
      }
    
      if(!reply){
        setStatus("返信本文を入力してください。", true);
        return;
      }
    
      setStatus("返信を保存しています。");
    
      const { error } = await client
        .from("user_feedback")
        .update({
          admin_reply: reply,
          replied_at: new Date().toISOString(),
          status: "closed"
        })
        .eq("id", id);
    
      if(error){
        console.error(error);
        setStatus("返信を保存できませんでした。RLS設定を確認してください。", true);
        return;
      }
    
      setStatus("返信を保存しました。");
      await loadFeedback();
    }

    async function updateFeedbackStatus(id, nextStatus){
      if(!id || !nextStatus){
        return;
      }

      setStatus("状態を更新しています。");

      const { error } = await client
        .from("user_feedback")
        .update({
          status: nextStatus
        })
        .eq("id", id);

      if(error){
        console.error(error);
        setStatus("状態を更新できませんでした。", true);
        return;
      }

      await loadFeedback();
    }

    async function checkSession(){
      const { data } = await client.auth.getSession();
    
      currentUser = data.session?.user || null;
    
      if(!currentUser){
        window.location.replace("/");
        return;
      }
      
      if(currentUser.id !== ADMIN_USER_ID){
        window.location.replace("/");
        return;
      }
    
      document.body.classList.remove("auth-locked");
  
        try{
          const users = await fetchAdminUsers("");
          renderNoticeUsers(users);
        }catch(error){
          console.error(error);
          setStatus(error.message || "ユーザー一覧を取得できませんでした。", true);
        }
      
        await loadFeedback();
    }

    async function logout(){
      await client.auth.signOut();
      window.location.href = "/account/";
    }

    noticeTargetType.addEventListener("change", updateNoticeTargetState);
    noticeUserSelect.addEventListener("change", updateNoticeTargetState);
    sendNoticeBtn.addEventListener("click", sendAdminNotice);
    clearNoticeBtn.addEventListener("click", clearNoticeForm);

    refreshBtn.addEventListener("click", loadFeedback);
    statusFilter.addEventListener("change", loadFeedback);

    logoutLink.addEventListener("click", async function(event){
      event.preventDefault();
      await logout();
    });

    checkSession();
  </script>
</body>
</html>
