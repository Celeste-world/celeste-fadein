<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login – Celeste Harbor</title>

  <meta name="description" content="Celeste Harbor へログインします。" />
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">

  <style>
    :root{
      --bg:#050811;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --line:#252b3a;
      --accent:#a9b7ff;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:radial-gradient(circle at top,#1a2440 0,var(--bg) 52%);
      color:var(--text);
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .panel{
      width:min(520px,100%);
      padding:32px;
      border:1px solid rgba(70,84,132,.55);
      border-radius:18px;
      background:rgba(10,14,28,.82);
      box-shadow:0 20px 48px rgba(0,0,0,.45);
    }

    h1{
      font-size:28px;
      font-weight:500;
      line-height:1.7;
      margin:0 0 18px;
    }

    p{
      color:var(--muted);
      line-height:2;
      font-size:14px;
      margin:0 0 26px;
    }

    button{
      width:100%;
      padding:13px 18px;
      border:0;
      border-radius:999px;
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
      font-size:15px;
      cursor:pointer;
      font-family:inherit;
    }

    .back{
      display:block;
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      text-decoration:none;
    }

    .back:hover{
      text-decoration:underline;
    }

    .status{
      margin-top:18px;
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="panel">
    <h1>港へ帰る。</h1>

    <p>
      Googleアカウントでログインします。<br>
      航海記録は、あなた自身のための非公開記録として扱われます。
    </p>

    <button id="login">
      Googleでログイン
    </button>

    <a class="back" href="/">
      港へ戻る
    </a>

    <div class="status" id="status"></div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const supabase = createClient(supabaseUrl, supabaseKey);

    const status = document.getElementById("status");

    document.getElementById("login").addEventListener("click", async () => {
      status.textContent = "Googleログインへ進みます。";

      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + '/log/'
        }
      });

      if (error) {
        console.error(error);
        status.textContent = "ログインに失敗しました。時間を置いてもう一度お試しください。";
      }
    });
  </script>
</body>
</html>
