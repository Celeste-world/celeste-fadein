<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Celeste Harbor</title>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:radial-gradient(circle at top,#1a2440 0,#050811 52%);
      color:#e8ebef;
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    }
    .panel{
      width:min(520px,90%);
      padding:32px;
      border:1px solid rgba(70,84,132,.55);
      border-radius:18px;
      background:rgba(10,14,28,.82);
      box-shadow:0 20px 48px rgba(0,0,0,.45);
    }
    h1{
      font-size:28px;
      font-weight:500;
      margin:0 0 18px;
      line-height:1.7;
    }
    p{
      color:#a0a8bb;
      line-height:2;
      font-size:14px;
      margin:0 0 26px;
    }
    button,a{
      font-family:inherit;
    }
    button{
      width:100%;
      padding:13px 18px;
      border:0;
      border-radius:999px;
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
      font-size:15px;
      cursor:pointer;
    }
    .back{
      display:block;
      margin-top:18px;
      text-align:center;
      color:#a0a8bb;
      font-size:13px;
      text-decoration:none;
    }
  </style>
</head>

<body>
  <div class="panel">
    <h1>港へ帰る。</h1>

    <p>
      Googleアカウントでログインします。<br>
      航海記録は、あなた自身のための非公開記録として扱われます。
    </p>

    <button id="login">Googleでログイン</button>

    <a class="back" href="/">港へ戻る</a>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const supabase = createClient(supabaseUrl, supabaseKey);

    document.getElementById("login").addEventListener("click", async () => {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: "https://celeste.world/log/"
        }
      });

      if (error) {
        alert("ログインに失敗しました。時間を置いてもう一度お試しください。");
        console.error(error);
      }
    });
  </script>
</body>
</html>
