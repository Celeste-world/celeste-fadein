<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Celeste Harbor</title>

  <meta name="description" content="Celeste Harbor は、静かに航海を続けるための帰港空間です。月夜の港から、航海記録、Fragments、Moonlit Voyage へ。" />
  <link rel="canonical" href="https://celeste.world/" />
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Celeste Harbor">
  <meta property="og:description" content="静かに航海を続けるための、小さなWebの港。">
  <meta property="og:url" content="https://celeste.world/">
  <meta property="og:image" content="https://celeste.world/images/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Celeste Harbor">
  <meta name="twitter:description" content="静かに航海を続けるための、小さなWebの港。">
  <meta name="twitter:image" content="https://celeste.world/images/og-image.png">

  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#050811;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --dim:#747f96;
      --accent:#a9b7ff;
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100vh;
      background:#050811;
      color:var(--text);
      font-family:
        "Hiragino Mincho ProN",
        "Yu Mincho",
        "Noto Serif JP",
        serif;
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font-family:inherit;
    }

    .entrance{
      position:relative;
      min-height:100vh;
      width:100%;
      overflow:hidden;
      background:
        linear-gradient(
          to bottom,
          rgba(5,8,17,.02) 0%,
          rgba(5,8,17,.04) 46%,
          rgba(5,8,17,.70) 100%
        ),
        url("/images/harbor-entrance.png") center / cover no-repeat;
    }

    .entrance::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 18%, rgba(169,183,255,.10), transparent 30%),
        linear-gradient(to bottom, rgba(3,5,11,.03), rgba(3,5,11,.36));
      pointer-events:none;
    }

    .gate{
      position:absolute;
      left:50%;
      bottom:32px;
      transform:translateX(-50%);
      z-index:2;
      width:min(760px, calc(100% - 32px));
      padding:18px 20px;
      border-radius:24px;
      border:1px solid rgba(169,183,255,.20);
      background:rgba(5,8,17,.56);
      backdrop-filter:blur(10px);
      box-shadow:
        0 24px 70px rgba(0,0,0,.46),
        inset 0 0 0 1px rgba(255,255,255,.025);
      text-align:center;
    }

    .brand{
      font-size:13px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:8px;
    }

    h1{
      margin:0 0 10px;
      font-size:24px;
      font-weight:500;
      line-height:1.55;
      text-shadow:0 2px 18px rgba(0,0,0,.45);
    }

    .lead{
      margin:0 auto 16px;
      max-width:36rem;
      font-size:13px;
      line-height:1.9;
      color:var(--muted);
    }

    .actions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:12px;
    }

    .btn-primary,
    .btn-ghost{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:190px;
      padding:11px 18px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
    }

    .btn-primary{
      border:1px solid transparent;
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
      box-shadow:0 12px 30px rgba(0,0,0,.32);
    }

    .btn-primary:hover{
      opacity:.92;
    }

    .btn-ghost{
      border:1px solid rgba(169,183,255,.28);
      color:var(--muted);
      background:rgba(255,255,255,.025);
    }

    .btn-ghost:hover{
      border-color:rgba(169,183,255,.48);
      color:var(--text);
    }

    .status{
      min-height:1.5em;
      margin-top:8px;
      font-size:12px;
      line-height:1.5;
      color:var(--dim);
    }

    @media(max-width:760px){
      .entrance{
        background:
          linear-gradient(
            to bottom,
            rgba(5,8,17,.00) 0%,
            rgba(5,8,17,.10) 48%,
            rgba(5,8,17,.78) 100%
          ),
          url("/images/harbor-entrance.png") center top / cover no-repeat;
      }

      .gate{
        bottom:22px;
        width:calc(100% - 24px);
        padding:16px 16px;
        border-radius:20px;
      }

      h1{
        font-size:21px;
      }

      .lead{
        font-size:12px;
        line-height:1.8;
      }

      .actions{
        flex-direction:column;
        gap:10px;
      }

      .btn-primary,
      .btn-ghost{
        width:100%;
        min-width:0;
      }
    }

    @media(max-height:620px){
      .gate{
        bottom:14px;
        padding:14px;
      }

      h1{
        font-size:20px;
        margin-bottom:6px;
      }

      .lead{
        display:none;
      }
    }
  </style>
</head>

<body>
  <div class="entrance">
    <section class="gate" aria-label="Celeste Harbor entrance">
      <div class="brand">Celeste Harbor</div>

      <h1>
        月夜の港へ、静かに帰る。
      </h1>

      <p class="lead">
        航海記録を残し、港のネコに受け取られ、
        必要な夜にまた戻ってくるための小さな港です。
      </p>

      <div class="actions">
        <button class="btn-primary" id="loginBtn" type="button">
          Googleでログインして帰港する
        </button>

        <a class="btn-ghost" href="/harbor/">
          ログインせず港を見る
        </a>
      </div>

      <div class="status" id="status"></div>
    </section>
  </div>

  <script>
    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const client = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

    const loginBtn = document.getElementById("loginBtn");
    const statusEl = document.getElementById("status");

    function setStatus(message){
      statusEl.textContent = message || "";
    }

    async function checkSession(){
      const { data, error } = await client.auth.getSession();

      if(error){
        console.error("getSession error:", error);
        return;
      }

      if(data.session && data.session.user){
        loginBtn.textContent = "港へ入る";
        loginBtn.addEventListener("click", function(){
          window.location.href = "/harbor/";
        });
      }else{
        loginBtn.addEventListener("click", login);
      }
    }

    async function login(){
      setStatus("Googleログインへ進みます。");

      const { error } = await client.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + "/harbor/",
          queryParams: {
            prompt: "select_account"
          }
        }
      });

      if(error){
        console.error("login error:", error);
        setStatus(error.message);
      }
    }

    checkSession();
  </script>
</body>
</html>
