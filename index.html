<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Celeste Harbor</title>

  <meta name="description" content="Celeste Harbor は、静かに航海を続けるための帰港空間です。Googleログインで港へ入り、航海記録を残していきます。" />
  <link rel="canonical" href="https://celeste.world/" />
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Celeste Harbor">
  <meta property="og:description" content="静かに航海を続けるための、小さなWebの港。">
  <meta property="og:url" content="https://celeste.world/">
  <meta property="og:image" content="https://celeste.world/images/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Celeste Harbor">
  <meta name="twitter:description" content="静かに航海を続けるための、小さなWebの港。">
  <meta name="twitter:image" content="https://celeste.world/images/og-image.png">

  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#050811;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --dim:#747f96;
      --accent:#a9b7ff;
      --danger:#ff9b9b;
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100vh;
      background:#050811;
      color:var(--text);
      font-family:
        "Hiragino Mincho ProN",
        "Yu Mincho",
        "Noto Serif JP",
        serif;
      overflow:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font-family:inherit;
    }

    .entrance{
      position:relative;
      min-height:100vh;
      width:100%;
      overflow:hidden;
      background:
        linear-gradient(
          to bottom,
          rgba(5,8,17,.00) 0%,
          rgba(5,8,17,.02) 48%,
          rgba(5,8,17,.40) 100%
        ),
        url("/images/harbor-entrance.png") center center / contain no-repeat,
        #050811;
    }

    .entrance::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 18%, rgba(169,183,255,.08), transparent 30%),
        radial-gradient(circle at 72% 78%, rgba(169,183,255,.05), transparent 34%);
      pointer-events:none;
    }

    .entrance::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          to bottom,
          rgba(3,5,11,.00) 0%,
          rgba(3,5,11,.02) 50%,
          rgba(3,5,11,.46) 100%
        );
      pointer-events:none;
    }

    .gate{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      z-index:2;
      width:min(520px, calc(100% - 28px));
      padding:14px;
      border-radius:22px;
      border:1px solid rgba(169,183,255,.18);
      background:rgba(5,8,17,.38);
      backdrop-filter:blur(8px);
      box-shadow:
        0 18px 48px rgba(0,0,0,.28),
        inset 0 0 0 1px rgba(255,255,255,.018);
      text-align:center;
    }

    .brand{
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--accent);
      white-space:nowrap;
      text-shadow:0 2px 14px rgba(0,0,0,.5);
      margin-bottom:4px;
    }

    .subline{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      text-shadow:0 2px 14px rgba(0,0,0,.5);
      margin-bottom:12px;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:10px;
      width:100%;
    }

    .btn-primary,
    .btn-ghost{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      padding:9px 12px;
      border-radius:999px;
      font-size:12px;
      cursor:pointer;
      white-space:nowrap;
    }

    .btn-primary{
      border:1px solid transparent;
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
      box-shadow:0 10px 24px rgba(0,0,0,.25);
    }

    .btn-primary:hover{
      opacity:.92;
    }

    .btn-ghost{
      border:1px solid rgba(169,183,255,.24);
      color:var(--muted);
      background:rgba(255,255,255,.022);
    }

    .btn-ghost:hover{
      border-color:rgba(169,183,255,.48);
      color:var(--text);
    }

    .status{
      min-height:1.4em;
      margin-top:8px;
      font-size:11px;
      line-height:1.5;
      color:var(--dim);
      text-shadow:0 2px 12px rgba(0,0,0,.55);
    }

    .status.error{
      color:var(--danger);
    }

    @media(max-width:760px){
      .entrance{
        background:
          linear-gradient(
            to bottom,
            rgba(5,8,17,.00) 0%,
            rgba(5,8,17,.04) 52%,
            rgba(5,8,17,.48) 100%
          ),
          url("/images/harbor-entrance.png") center center / contain no-repeat,
          #050811;
      }

      .entrance::after{
        background:
          linear-gradient(
            to bottom,
            rgba(3,5,11,.00) 0%,
            rgba(3,5,11,.04) 52%,
            rgba(3,5,11,.52) 100%
          );
      }

      .gate{
        bottom:12px;
        width:calc(100% - 20px);
        border-radius:18px;
        padding:12px;
        background:rgba(5,8,17,.36);
      }

      .brand{
        font-size:11px;
      }

      .subline{
        font-size:12px;
      }

      .actions{
        grid-template-columns:1fr;
        gap:8px;
      }

      .btn-primary,
      .btn-ghost{
        padding:9px 10px;
        font-size:12px;
      }
    }

    @media(max-height:620px){
      .gate{
        bottom:10px;
        padding:10px 12px;
      }

      .subline{
        display:none;
      }
    }

    @media(max-width:420px){
      .gate{
        bottom:10px;
      }

      .brand{
        font-size:10px;
      }

      .btn-primary,
      .btn-ghost{
        font-size:11px;
        padding:8px 9px;
      }
    }
  </style>
</head>

<body>
  <div class="entrance">
    <section class="gate" aria-label="Celeste Harbor entrance">
      <div class="brand">Celeste Harbor</div>
      <div class="subline">月夜の港へ、静かに帰る。</div>

      <div class="actions">
        <button class="btn-primary" id="loginBtn" type="button">
          Googleでログイン
        </button>

        <a class="btn-ghost" href="/about/">
          このサイトについて
        </a>
      </div>

      <div class="status" id="status"></div>
    </section>
  </div>

  <script>
    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const client = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

    const loginBtn = document.getElementById("loginBtn");
    const statusEl = document.getElementById("status");

    function setStatus(message, isError = false){
      statusEl.textContent = message || "";
      statusEl.className = isError ? "status error" : "status";
    }

    async function checkSession(){
      const { data, error } = await client.auth.getSession();

      if(error){
        console.error("getSession error:", error);
        setStatus("ログイン状態を確認できませんでした。", true);
        loginBtn.addEventListener("click", login);
        return;
      }

      if(data.session && data.session.user){
        loginBtn.textContent = "港へ入る";
        loginBtn.addEventListener("click", function(){
          window.location.href = "/log/";
        });
      }else{
        loginBtn.textContent = "Googleでログイン";
        loginBtn.addEventListener("click", login);
      }
    }

    async function login(){
      setStatus("Googleログインへ進みます。");

      const { error } = await client.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + "/log/",
          queryParams: {
            prompt: "select_account"
          }
        }
      });

      if(error){
        console.error("login error:", error);
        setStatus(error.message, true);
      }
    }

    checkSession();
  </script>
</body>
</html>
