<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Celeste Harbor</title>

  <meta name="description" content="Celeste Harbor は、静かに航海を続けるための帰港空間です。月夜の港から、航海記録、Fragments、Moonlit Voyage へ。" />
  <link rel="canonical" href="https://celeste.world/" />
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Celeste Harbor">
  <meta property="og:description" content="静かに航海を続けるための、小さなWebの港。">
  <meta property="og:url" content="https://celeste.world/">
  <meta property="og:image" content="https://celeste.world/images/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Celeste Harbor">
  <meta name="twitter:description" content="静かに航海を続けるための、小さなWebの港。">
  <meta name="twitter:image" content="https://celeste.world/images/og-image.png">

  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#050811;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --dim:#747f96;
      --line:#252b3a;
      --accent:#a9b7ff;
      --panel:rgba(5,8,17,.58);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
    }

    body{
      min-height:100vh;
      color:var(--text);
      font-family:
        "Hiragino Mincho ProN",
        "Yu Mincho",
        "Noto Serif JP",
        serif;
      background:#050811;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font-family:inherit;
    }

    .entrance{
      min-height:100vh;
      position:relative;
      display:flex;
      align-items:stretch;
      justify-content:center;
      padding:34px 20px;
      overflow:hidden;
      background:
        linear-gradient(
          to bottom,
          rgba(5,8,17,.16) 0%,
          rgba(5,8,17,.22) 46%,
          rgba(5,8,17,.82) 100%
        ),
        url("/images/harbor-entrance.png") center / cover no-repeat;
    }

    .entrance::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 18%, rgba(169,183,255,.14), transparent 30%),
        radial-gradient(circle at 72% 78%, rgba(169,183,255,.08), transparent 34%);
      pointer-events:none;
    }

    .entrance::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(
          to bottom,
          rgba(3,5,11,.06) 0%,
          rgba(3,5,11,.08) 48%,
          rgba(3,5,11,.86) 100%
        );
      pointer-events:none;
    }

    .wrap{
      width:min(980px,100%);
      min-height:calc(100vh - 68px);
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      color:var(--muted);
      font-size:13px;
    }

    .brand{
      color:var(--text);
      letter-spacing:.06em;
      text-shadow:0 2px 18px rgba(0,0,0,.55);
    }

    .nav{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .nav a{
      color:var(--muted);
      text-shadow:0 2px 18px rgba(0,0,0,.55);
    }

    .nav a:hover{
      color:var(--text);
    }

    main{
      margin-top:auto;
      padding:42px 0 30px;
      display:flex;
      justify-content:center;
    }

    .gate{
      width:min(620px,100%);
      text-align:center;
      padding:26px 24px 24px;
      border:1px solid rgba(169,183,255,.20);
      border-radius:24px;
      background:
        linear-gradient(180deg, rgba(5,8,17,.42), rgba(5,8,17,.70)),
        rgba(5,8,17,.38);
      backdrop-filter:blur(8px);
      box-shadow:
        0 24px 70px rgba(0,0,0,.42),
        inset 0 0 0 1px rgba(255,255,255,.025);
    }

    .label{
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:14px;
    }

    h1{
      font-size:34px;
      line-height:1.65;
      font-weight:500;
      margin:0 0 18px;
      text-shadow:0 2px 22px rgba(0,0,0,.48);
    }

    .lead{
      font-size:14px;
      line-height:2;
      color:var(--muted);
      margin:0 auto 24px;
      max-width:34rem;
    }

    .actions{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:14px;
      margin-bottom:16px;
    }

    .btn-primary,
    .btn-ghost{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:190px;
      padding:12px 20px;
      border-radius:999px;
      font-size:14px;
      cursor:pointer;
    }

    .btn-primary{
      border:1px solid transparent;
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
      box-shadow:0 14px 34px rgba(0,0,0,.34);
    }

    .btn-primary:hover{
      opacity:.92;
    }

    .btn-ghost{
      border:1px solid rgba(169,183,255,.26);
      color:var(--muted);
      background:rgba(255,255,255,.025);
    }

    .btn-ghost:hover{
      border-color:rgba(169,183,255,.48);
      color:var(--text);
    }

    .status{
      min-height:1.8em;
      font-size:12px;
      line-height:1.8;
      color:var(--dim);
      margin-top:8px;
    }

    .note{
      margin-top:12px;
      font-size:12px;
      line-height:1.8;
      color:var(--dim);
    }

    footer{
      padding-top:16px;
      border-top:1px solid rgba(169,183,255,.16);
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:14px;
      font-size:12px;
      color:var(--muted);
      text-shadow:0 2px 18px rgba(0,0,0,.55);
    }

    .footer-links{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    footer a:hover{
      color:var(--text);
    }

    @media(max-width:760px){
      .entrance{
        padding:28px 16px;
        background:
          linear-gradient(
            to bottom,
            rgba(5,8,17,.08) 0%,
            rgba(5,8,17,.24) 42%,
            rgba(5,8,17,.88) 100%
          ),
          url("/images/harbor-entrance.png") center top / cover no-repeat;
      }

      .wrap{
        min-height:calc(100vh - 56px);
      }

      header{
        align-items:flex-start;
        flex-direction:column;
      }

      .nav{
        gap:12px;
        font-size:12px;
        justify-content:flex-start;
      }

      main{
        padding:36px 0 26px;
      }

      .gate{
        padding:22px 18px 20px;
        border-radius:20px;
      }

      h1{
        font-size:29px;
      }

      .lead{
        font-size:13px;
      }

      .actions{
        flex-direction:column;
        align-items:stretch;
      }

      .btn-primary,
      .btn-ghost{
        width:100%;
      }
    }

    @media(max-width:420px){
      h1{
        font-size:27px;
      }

      .gate{
        padding:20px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="entrance">
    <div class="wrap">

      <header>
        <a class="brand" href="/">
          Celeste Harbor
        </a>

        <nav class="nav" aria-label="Main navigation">
          <a href="/harbor/">Harbor</a>
          <a href="/log/">Voyage Log</a>
          <a href="/voyage/">Moonlit Voyage</a>
          <a href="/fragments/">Fragments</a>
          <a href="/map/">Map</a>
        </nav>
      </header>

      <main>
        <section class="gate" aria-label="Celeste Harbor entrance">
          <div class="label">Quiet Reflective Web</div>

          <h1>
            月夜の港へ、<br>
            静かに帰る。
          </h1>

          <p class="lead">
            航海記録を残し、港のネコに受け取られ、
            必要な夜にまた戻ってくるための小さな港です。
          </p>

          <div class="actions">
            <button class="btn-primary" id="loginBtn" type="button">
              Googleでログインして帰港する
            </button>

            <a class="btn-ghost" href="/harbor/">
              ログインせず港を見る
            </a>
          </div>

          <div class="status" id="status"></div>

          <div class="note">
            ログインすると、Voyage Log と Harbor Cat が使えるようになります。
          </div>
        </section>
      </main>

      <footer>
        <div class="footer-links">
          <a href="/harbor/">Harbor</a>
          <a href="/log/">Voyage Log</a>
          <a href="/fragments/">Fragments</a>
          <a href="/tickets/">Tickets</a>
          <a href="/archive/">Archive</a>
        </div>

        <div>CELESTE HARBOR</div>
      </footer>

    </div>
  </div>

  <script>
    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const client = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

    const loginBtn = document.getElementById("loginBtn");
    const statusEl = document.getElementById("status");

    function setStatus(message){
      statusEl.textContent = message || "";
    }

    async function checkSession(){
      const { data, error } = await client.auth.getSession();

      if(error){
        console.error("getSession error:", error);
        return;
      }

      if(data.session && data.session.user){
        loginBtn.textContent = "港へ入る";
        loginBtn.addEventListener("click", function(){
          window.location.href = "/harbor/";
        });
      }else{
        loginBtn.addEventListener("click", login);
      }
    }

    async function login(){
      setStatus("Googleログインへ進みます。");

      const { error } = await client.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + "/harbor/",
          queryParams: {
            prompt: "select_account"
          }
        }
      });

      if(error){
        console.error("login error:", error);
        setStatus(error.message);
      }
    }

    checkSession();
  </script>
</body>
</html>
