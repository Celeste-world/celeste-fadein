<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Celeste Harbor</title>

  <meta name="description" content="Celeste Harbor は、人生を航海として記録する静かなWebの港です。日々の言葉を航海記録として残し、未来の自分が振り返れる人生の航海史を育てていきます。" />
  <link rel="canonical" href="https://celeste.world/" />
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Celeste Harbor">
  <meta property="og:description" content="人生を航海として記録する、静かなWebの港。">
  <meta property="og:url" content="https://celeste.world/">
  <meta property="og:image" content="https://celeste.world/images/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Celeste Harbor">
  <meta name="twitter:description" content="人生を航海として記録する、静かなWebの港。">
  <meta name="twitter:image" content="https://celeste.world/images/og-image.png">

  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#050811;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --dim:#747f96;
      --accent:#a9b7ff;
      --danger:#ff9b9b;
      --panel:rgba(5,8,17,.50);
      --line:rgba(169,183,255,.18);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      width:100%;
      min-height:100%;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(169,183,255,.08), transparent 34%),
        radial-gradient(circle at 72% 78%, rgba(169,183,255,.05), transparent 34%),
        #050811;
      color:var(--text);
      font-family:
        "Hiragino Mincho ProN",
        "Yu Mincho",
        "Noto Serif JP",
        serif;
      overflow-x:hidden;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button{
      font-family:inherit;
    }

    .page{
      position:relative;
      width:100%;
      min-height:100vh;
      overflow:hidden;
    }

    .page::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:0;
      background:
        linear-gradient(
          to bottom,
          rgba(3,5,11,.04) 0%,
          rgba(3,5,11,.10) 48%,
          rgba(3,5,11,.24) 100%
        );
      pointer-events:none;
    }

    .content{
      position:relative;
      z-index:2;
      width:min(860px, calc(100% - 32px));
      margin:0 auto;
      padding:28px 0 42px;
    }

    .hero-art{
      width:100%;
      height:min(42vh, 360px);
      min-height:210px;
      margin:0 auto 20px;
      background:
        url("/images/harbor-entrance.png") center center / contain no-repeat;
      filter:
        brightness(.95)
        saturate(.98)
        contrast(1.02);
    }

    .hero{
      text-align:center;
      text-shadow:
        0 2px 14px rgba(0,0,0,.58),
        0 0 20px rgba(5,8,17,.42);
      margin-bottom:18px;
    }

    .kicker{
      margin:0 0 8px;
      color:var(--accent);
      font-size:10px;
      letter-spacing:.18em;
      text-transform:uppercase;
      opacity:.74;
    }

    .hero h1{
      margin:0;
      color:rgba(232,235,239,.92);
      font-size:clamp(20px, 4vw, 34px);
      font-weight:400;
      line-height:1.65;
      letter-spacing:.04em;
    }

    .lead{
      margin:14px auto 0;
      max-width:620px;
      color:rgba(160,168,187,.84);
      font-size:14px;
      line-height:2;
    }

    .gate{
      margin:22px auto 20px;
      width:min(680px, 100%);
      padding:18px;
      border-radius:24px;
      border:1px solid rgba(169,183,255,.22);
      background:rgba(5,8,17,.48);
      backdrop-filter:blur(10px);
      box-shadow:
        0 18px 48px rgba(0,0,0,.32),
        inset 0 0 0 1px rgba(255,255,255,.018);
      text-align:center;
    }

    .brand{
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--accent);
      white-space:nowrap;
      text-shadow:0 2px 14px rgba(0,0,0,.55);
      margin-bottom:5px;
    }

    .subline{
      font-size:12px;
      color:var(--muted);
      text-shadow:0 2px 14px rgba(0,0,0,.55);
      margin-bottom:14px;
      line-height:1.7;
    }

    .actions{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:10px;
      width:min(520px, 100%);
      margin:0 auto;
    }

    .btn-primary,
    .btn-ghost{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:100%;
      padding:10px 14px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
      white-space:nowrap;
    }

    .btn-primary{
      border:1px solid transparent;
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
      box-shadow:0 10px 24px rgba(0,0,0,.25);
    }

    .btn-primary:hover{
      opacity:.92;
    }

    .btn-ghost{
      border:1px solid rgba(169,183,255,.28);
      color:var(--muted);
      background:rgba(255,255,255,.026);
    }

    .btn-ghost:hover{
      border-color:rgba(169,183,255,.48);
      color:var(--text);
    }

    .status{
      min-height:1.4em;
      margin-top:10px;
      font-size:11px;
      line-height:1.5;
      color:var(--dim);
      text-shadow:0 2px 12px rgba(0,0,0,.55);
    }

    .status.error{
      color:var(--danger);
    }

    .steps{
      width:min(760px, 100%);
      margin:18px auto 20px;
      padding:18px;
      border-radius:24px;
      border:1px solid rgba(169,183,255,.16);
      background:rgba(5,8,17,.36);
      backdrop-filter:blur(8px);
      text-align:center;
      box-shadow:0 14px 38px rgba(0,0,0,.20);
    }

    .steps-title{
      margin:0 0 12px;
      color:var(--accent);
      font-size:12px;
      letter-spacing:.12em;
      font-weight:400;
    }

    .steps-grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
    }

    .step-card{
      padding:13px 12px;
      border-radius:18px;
      background:rgba(255,255,255,.024);
      border:1px solid rgba(169,183,255,.12);
    }

    .step-card h2{
      margin:0 0 6px;
      color:rgba(232,235,239,.9);
      font-size:13px;
      font-weight:400;
      letter-spacing:.04em;
    }

    .step-card p{
      margin:0;
      color:rgba(160,168,187,.80);
      font-size:11px;
      line-height:1.7;
    }

    .note{
      width:min(680px, 100%);
      margin:18px auto 0;
      padding:16px 18px;
      border-radius:22px;
      border:1px solid rgba(169,183,255,.13);
      background:rgba(255,255,255,.020);
      text-align:center;
      color:rgba(160,168,187,.78);
      font-size:12px;
      line-height:1.9;
    }

    .note-link{
      display:inline-flex;
      margin-top:10px;
      color:var(--accent);
      font-size:12px;
      text-decoration:none;
    }

    .note-link:hover{
      color:var(--text);
    }

    .sp-only{
      display:none;
    }

    @media(max-width:760px){
      .content{
        width:calc(100% - 24px);
        padding:18px 0 34px;
      }

      .hero-art{
        height:32vh;
        min-height:170px;
        margin-bottom:16px;
        background-position:center top;
      }

      .kicker{
        font-size:9px;
        margin-bottom:6px;
      }

      .hero h1{
        font-size:20px;
        line-height:1.6;
      }

      .lead{
        margin-top:12px;
        font-size:12px;
        line-height:1.9;
      }

      .gate{
        margin:18px auto 18px;
        padding:15px;
        border-radius:20px;
      }

      .brand{
        font-size:11px;
      }

      .subline{
        font-size:11.5px;
        margin-bottom:12px;
      }

      .actions{
        grid-template-columns:1fr;
        gap:9px;
      }

      .btn-primary,
      .btn-ghost{
        padding:10px 12px;
        font-size:12px;
      }

      .steps{
        margin:16px auto 18px;
        padding:14px;
        border-radius:20px;
      }

      .steps-title{
        font-size:11px;
        margin-bottom:10px;
      }

      .steps-grid{
        grid-template-columns:1fr;
        gap:8px;
      }

      .step-card{
        padding:10px 12px;
      }

      .step-card h2{
        font-size:12px;
        margin-bottom:4px;
      }

      .step-card p{
        font-size:10.5px;
        line-height:1.6;
      }

      .note{
        font-size:11px;
        padding:14px;
        border-radius:18px;
      }

      .sp-only{
        display:block;
      }
    }

    @media(max-width:420px){
      .content{
        width:calc(100% - 22px);
        padding-top:14px;
      }

      .hero-art{
        height:29vh;
        min-height:150px;
        margin-bottom:14px;
      }

      .hero h1{
        font-size:18px;
        line-height:1.6;
      }

      .lead{
        font-size:11.5px;
        line-height:1.85;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="content">
      <div class="hero-art" aria-hidden="true"></div>

      <section class="hero" aria-label="Celeste Harbor description">
        <p class="kicker">A HARBOR FOR YOUR VOYAGE</p>

        <h1>
          あなたの人生を、<br class="sp-only">
          航海として残す場所。
        </h1>

        <p class="lead">
          書いた言葉は航海記録となり、少しずつ海を広げていきます。<br>
          続けるほど、未来のあなたが振り返れる人生の航海史になります。
        </p>
      </section>

      <section class="gate" aria-label="Celeste Harbor entrance">
        <div class="brand">Celeste Harbor</div>
        <div class="subline">
          今日の言葉が、未来への航海記録になる。
        </div>

        <div class="actions">
          <button class="btn-primary" id="loginBtn" type="button">
            港へ入る
          </button>

          <a class="btn-ghost" href="/intro/">
            はじめての方へ
          </a>
        </div>

        <div class="status" id="status"></div>
      </section>

      <section class="steps" aria-label="Celeste Harbor steps">
        <p class="steps-title">航海の流れ</p>

        <div class="steps-grid">
          <div class="step-card">
            <h2>① 言葉を残す</h2>
            <p>今日の出来事を記録</p>
          </div>

          <div class="step-card">
            <h2>② 記録が積み重なる</h2>
            <p>海や船が広がる</p>
          </div>

          <div class="step-card">
            <h2>③ 人生の航海史になる</h2>
            <p>過去を振り返れる</p>
          </div>
        </div>
      </section>

      <section class="note" aria-label="Celeste Harbor note">
        船や漂着物は、ゲームの報酬ではありません。<br>
        あなたが言葉を残し続けた証として、静かに港へ積み重なっていきます。<br>
        <a class="note-link" href="/voyage/">
          Moonlit Voyage を読む
        </a>
      </section>
    </div>
  </main>

  <script>
    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const client = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

    const loginBtn = document.getElementById("loginBtn");
    const statusEl = document.getElementById("status");

    function setStatus(message, isError = false){
      statusEl.textContent = message || "";
      statusEl.className = isError ? "status error" : "status";
    }

    async function checkSession(){
      const { data, error } = await client.auth.getSession();

      if(error){
        console.error("getSession error:", error);
        setStatus("ログイン状態を確認できませんでした。", true);
        loginBtn.addEventListener("click", login);
        return;
      }

      if(data.session && data.session.user){
        loginBtn.textContent = "港へ入る";
        loginBtn.addEventListener("click", function(){
          window.location.href = "/log/";
        });
      }else{
        loginBtn.textContent = "Googleでログイン";
        loginBtn.addEventListener("click", login);
      }
    }

    async function login(){
      setStatus("Googleログインへ進みます。");

      const { error } = await client.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + "/log/",
          queryParams: {
            prompt: "select_account"
          }
        }
      });

      if(error){
        console.error("login error:", error);
        setStatus(error.message, true);
      }
    }

    checkSession();
  </script>
</body>
</html>
