<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Celeste Harbor</title>

  <meta name="description" content="Celeste Harbor は、静かに航海を続けるための帰港空間です。月夜の港から、航海記録、Fragments、Moonlit Voyage へ。" />
  <link rel="canonical" href="https://celeste.world/" />
  <meta name="robots" content="index, follow">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Celeste Harbor">
  <meta property="og:description" content="静かに航海を続けるための、小さなWebの港。">
  <meta property="og:url" content="https://celeste.world/">
  <meta property="og:image" content="https://celeste.world/images/og-image.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Celeste Harbor">
  <meta name="twitter:description" content="静かに航海を続けるための、小さなWebの港。">
  <meta name="twitter:image" content="https://celeste.world/images/og-image.png">

  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">

  <style>
    :root{
      --bg:#050811;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --line:#252b3a;
      --accent:#a9b7ff;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      color:var(--text);
      font-family:
        "Hiragino Mincho ProN",
        "Yu Mincho",
        "Noto Serif JP",
        serif;
      background:#050811;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .entrance{
      min-height:100vh;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:42px 20px;
      overflow:hidden;
      background:
        linear-gradient(
          90deg,
          rgba(5,8,17,.94) 0%,
          rgba(5,8,17,.78) 38%,
          rgba(5,8,17,.42) 100%
        ),
        url("/images/harbor-entrance.png") center / cover no-repeat;
    }

    .entrance::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 22% 18%, rgba(169,183,255,.14), transparent 32%),
        radial-gradient(circle at 72% 72%, rgba(169,183,255,.10), transparent 34%),
        rgba(3,5,11,.18);
      pointer-events:none;
    }

    .entrance::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(
        to bottom,
        rgba(5,8,17,.08),
        rgba(5,8,17,.22) 48%,
        rgba(5,8,17,.74)
      );
      pointer-events:none;
    }

    .wrap{
      width:min(980px, 100%);
      position:relative;
      z-index:1;
      min-height:calc(100vh - 84px);
      display:flex;
      flex-direction:column;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      color:var(--muted);
      font-size:13px;
      margin-bottom:auto;
    }

    .brand{
      color:var(--text);
      letter-spacing:.06em;
    }

    .nav{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .nav a{
      color:var(--muted);
    }

    .nav a:hover{
      color:var(--text);
    }

    main{
      max-width:560px;
      padding:76px 0 86px;
    }

    .label{
      font-size:13px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:22px;
    }

    h1{
      font-size:42px;
      line-height:1.65;
      font-weight:500;
      margin:0 0 24px;
    }

    .lead{
      font-size:15px;
      line-height:2.1;
      color:var(--muted);
      max-width:34rem;
      margin:0 0 32px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      margin-bottom:24px;
    }

    .btn-primary,
    .btn-ghost{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 20px;
      border-radius:999px;
      font-size:14px;
    }

    .btn-primary{
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
      box-shadow:0 14px 34px rgba(0,0,0,.34);
    }

    .btn-primary:hover{
      opacity:.92;
    }

    .btn-ghost{
      border:1px solid rgba(169,183,255,.24);
      color:var(--muted);
      background:rgba(5,8,17,.48);
      backdrop-filter:blur(6px);
    }

    .btn-ghost:hover{
      border-color:rgba(169,183,255,.48);
      color:var(--text);
    }

    .note{
      font-size:13px;
      line-height:2;
      color:var(--muted);
      border-left:1px solid rgba(169,183,255,.38);
      padding-left:16px;
      max-width:34rem;
    }

    footer{
      margin-top:auto;
      padding-top:18px;
      border-top:1px solid rgba(169,183,255,.16);
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:14px;
      font-size:12px;
      color:var(--muted);
    }

    .footer-links{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    footer a:hover{
      color:var(--text);
    }

    @media(max-width:760px){
      .entrance{
        align-items:flex-start;
        background:
          linear-gradient(
            to bottom,
            rgba(5,8,17,.88) 0%,
            rgba(5,8,17,.68) 48%,
            rgba(5,8,17,.92) 100%
          ),
          url("/images/harbor-entrance.png") center top / cover no-repeat;
      }

      .wrap{
        min-height:calc(100vh - 84px);
      }

      header{
        align-items:flex-start;
        flex-direction:column;
      }

      .nav{
        gap:12px;
        font-size:12px;
        justify-content:flex-start;
      }

      main{
        padding:70px 0 70px;
      }

      h1{
        font-size:34px;
      }
    }

    @media(max-width:480px){
      h1{
        font-size:30px;
      }

      .lead{
        font-size:14px;
      }

      .actions{
        flex-direction:column;
        align-items:flex-start;
      }

      .btn-primary,
      .btn-ghost{
        width:100%;
      }
    }
  </style>
</head>

<body>
  <div class="entrance">
    <div class="wrap">

      <header>
        <a class="brand" href="/">
          Celeste Harbor
        </a>

        <nav class="nav" aria-label="Main navigation">
          <a href="/harbor/">Harbor</a>
          <a href="/log/">Voyage Log</a>
          <a href="/voyage/">Moonlit Voyage</a>
          <a href="/fragments/">Fragments</a>
          <a href="/map/">Map</a>
        </nav>
      </header>

      <main>
        <div class="label">Quiet Reflective Web</div>

        <h1>
          月夜の港へ、<br>
          静かに帰る。
        </h1>

        <p class="lead">
          Celeste Harbor は、
          航海を続けるための小さな帰港空間です。<br>
          記録を残し、断片に触れ、
          必要な夜にまた戻ってくるために。
        </p>

        <div class="actions">
          <a class="btn-primary" href="/harbor/">
            港へ入る
          </a>

          <a class="btn-ghost" href="/log/">
            航海記録を残す
          </a>

          <a class="btn-ghost" href="/voyage/">
            月夜の航海へ
          </a>
        </div>

        <div class="note">
          急ぐ必要はありません。<br>
          今夜の港は、静かに開いています。
        </div>
      </main>

      <footer>
        <div class="footer-links">
          <a href="/harbor/">Harbor</a>
          <a href="/log/">Voyage Log</a>
          <a href="/fragments/">Fragments</a>
          <a href="/tickets/">Tickets</a>
          <a href="/archive/">Archive</a>
        </div>

        <div>CELESTE HARBOR</div>
      </footer>

    </div>
  </div>
</body>
</html>
