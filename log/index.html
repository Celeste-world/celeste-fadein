<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Voyage Log – Celeste Harbor</title>
  <meta name="robots" content="noindex, nofollow" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#050811;
      --panel:#111623;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --line:#252b3a;
      --accent:#a9b7ff;
      --danger:#ff9b9b;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:radial-gradient(circle at top,#1a2440 0,var(--bg) 52%);
      color:var(--text);
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      padding:40px 20px;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
    }

    .site-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      margin-bottom:44px;
      color:var(--muted);
      font-size:13px;
    }

    .brand{
      color:var(--text);
      letter-spacing:.04em;
      text-decoration:none;
    }

    .nav{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }

    .nav a{
      color:var(--muted);
      text-decoration:none;
    }

    .nav a:hover{
      color:var(--text);
    }

    h1{
      font-size:34px;
      font-weight:500;
      line-height:1.7;
      margin:0 0 12px;
    }

    .lead{
      color:var(--muted);
      line-height:2;
      font-size:14px;
      margin-bottom:28px;
    }

    .panel{
      background:rgba(10,14,28,.82);
      border:1px solid rgba(70,84,132,.55);
      border-radius:18px;
      padding:24px;
      box-shadow:0 20px 48px rgba(0,0,0,.42);
      margin-bottom:24px;
    }

    textarea,
    input{
      width:100%;
      background:rgba(5,8,17,.85);
      border:1px solid rgba(160,168,187,.25);
      color:var(--text);
      border-radius:14px;
      padding:14px;
      font-family:inherit;
      font-size:15px;
      outline:none;
      margin-bottom:14px;
    }

    textarea{
      min-height:180px;
      line-height:1.9;
      resize:vertical;
    }

    textarea:focus,
    input:focus{
      border-color:rgba(169,183,255,.65);
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    button{
      border:0;
      border-radius:999px;
      padding:11px 18px;
      font-family:inherit;
      font-size:14px;
      cursor:pointer;
    }

    .primary{
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
    }

    .ghost{
      background:transparent;
      color:var(--muted);
      border:1px solid var(--line);
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .status{
      margin-top:16px;
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      min-height:1.8em;
    }

    .status.error{
      color:var(--danger);
    }

    .user{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      margin-bottom:18px;
    }

    .log{
      background:rgba(10,14,28,.68);
      border:1px solid rgba(70,84,132,.45);
      border-radius:18px;
      padding:20px;
      margin-bottom:16px;
    }

    .date{
      color:var(--muted);
      font-size:12px;
      margin-bottom:12px;
    }

    .content{
      white-space:pre-wrap;
      line-height:1.9;
      font-size:14px;
    }

    .tag{
      display:inline-block;
      margin-top:14px;
      padding:5px 11px;
      border-radius:999px;
      border:1px solid rgba(160,168,187,.28);
      color:var(--muted);
      font-size:12px;
    }

    footer{
      margin-top:40px;
      padding-top:18px;
      border-top:1px solid rgba(37,43,58,.9);
      color:var(--muted);
      font-size:12px;
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:14px;
    }

    footer a{
      color:var(--muted);
      text-decoration:none;
    }

    footer a:hover{
      color:var(--text);
    }

    @media(max-width:640px){
      body{
        padding:28px 16px;
      }

      .site-header{
        align-items:flex-start;
        flex-direction:column;
        margin-bottom:34px;
      }

      .nav{
        gap:12px;
        font-size:12px;
      }

      h1{
        font-size:30px;
      }

      .panel{
        padding:20px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header class="site-header">
      <a class="brand" href="/">Celeste Harbor</a>

      <nav class="nav">
        <a href="/">Harbor</a>
        <a href="/log/">Voyage Log</a>
        <a href="/fragments/">Fragments</a>
        <a href="/voyage/">Moonlit Voyage</a>
      </nav>
    </header>

    <main>
      <h1>Voyage Log</h1>

      <p class="lead">
        今日の航海を、静かに残す場所です。<br>
        記録はあなた自身のために保存されます。
      </p>

      <section class="panel">
        <div class="user" id="userStatus">
          ログイン状態を確認しています。
        </div>

        <textarea id="content" placeholder="今日の航海を記録する..."></textarea>

        <input id="tag" placeholder="Tag 例：Fog / Deep Sea / Calm Tide" />

        <div class="actions">
          <button class="primary" id="saveBtn">Save Log</button>
          <button class="ghost" id="loginBtn">Googleでログイン</button>
          <button class="ghost" id="logoutBtn">ログアウト</button>
        </div>

        <div class="status" id="status"></div>
      </section>

      <section id="logs"></section>
    </main>

    <footer>
      <div>
        <a href="/">Harbor</a>
        ・
        <a href="/log/">Voyage Log</a>
        ・
        <a href="/fragments/">Fragments</a>
        ・
        <a href="/voyage/">Moonlit Voyage</a>
      </div>
      <div>CELESTE HARBOR</div>
    </footer>

  </div>

  <script>
    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const client = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

    const userStatus = document.getElementById("userStatus");
    const statusEl = document.getElementById("status");
    const saveBtn = document.getElementById("saveBtn");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const logsEl = document.getElementById("logs");

    let currentUser = null;

    function setStatus(message, isError = false){
      statusEl.textContent = message || "";
      statusEl.className = isError ? "status error" : "status";
    }

    function escapeHtml(str){
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function checkSession(){
      setStatus("ログイン状態を確認しています。");

      const { data, error } = await client.auth.getSession();

      if(error){
        console.error("getSession error:", error);
        userStatus.textContent = "ログイン状態の確認に失敗しました。";
        setStatus(error.message, true);
        return;
      }

      if(data.session && data.session.user){
        currentUser = data.session.user;
        userStatus.textContent = "ログイン中：" + currentUser.email;
        setStatus("港へ戻りました。");
        await loadLogs();
      }else{
        currentUser = null;
        userStatus.textContent = "未ログインです。先にGoogleでログインしてください。";
        setStatus("ログインすると航海記録を保存できます。");
      }
    }

    async function login(){
      setStatus("Googleログインへ進みます。");

      const { error } = await client.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + "/log/",
          queryParams: {
            prompt: "select_account"
          }
        }
      });

      if(error){
        console.error("login error:", error);
        setStatus(error.message, true);
      }
    }

    async function logout(){
      const { error } = await client.auth.signOut();

      if(error){
        console.error("logout error:", error);
        setStatus(error.message, true);
        return;
      }

      currentUser = null;
      logsEl.innerHTML = "";
      userStatus.textContent = "未ログインです。";
      setStatus("ログアウトしました。");
    }

    async function saveLog(){
      setStatus("保存しています。");
      saveBtn.disabled = true;

      try{
        const content = document.getElementById("content").value.trim();
        const tag = document.getElementById("tag").value.trim();

        if(!currentUser){
          setStatus("先にログインしてください。", true);
          return;
        }

        if(!content){
          setStatus("航海記録が空です。", true);
          return;
        }

        const { error } = await client
          .from("voyage_logs")
          .insert([
            {
              user_id: currentUser.id,
              content: content,
              tag: tag || "Harbor"
            }
          ]);

        if(error){
          console.error("insert error:", error);
          setStatus("保存失敗：" + error.message, true);
          return;
        }

        document.getElementById("content").value = "";
        document.getElementById("tag").value = "";

        setStatus("航海記録を保存しました。");
        await loadLogs();

      }catch(error){
        console.error("saveLog catch:", error);
        setStatus("保存処理でエラーが発生しました：" + error.message, true);
      }finally{
        saveBtn.disabled = false;
      }
    }

    async function loadLogs(){
      if(!currentUser){
        return;
      }

      const { data, error } = await client
        .from("voyage_logs")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending:false });

      if(error){
        console.error("load error:", error);
        setStatus("読み込み失敗：" + error.message, true);
        return;
      }

      logsEl.innerHTML = "";

      if(!data || data.length === 0){
        logsEl.innerHTML = `
          <div class="log">
            <div class="content">まだ航海記録はありません。</div>
          </div>
        `;
        return;
      }

      data.forEach(log => {
        const div = document.createElement("div");
        div.className = "log";

        const date = new Date(log.created_at).toLocaleString("ja-JP");

        div.innerHTML = `
          <div class="date">${escapeHtml(date)}</div>
          <div class="content">${escapeHtml(log.content)}</div>
          <div class="tag">#${escapeHtml(log.tag || "Harbor")}</div>
        `;

        logsEl.appendChild(div);
      });
    }

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);
    saveBtn.addEventListener("click", saveLog);

    client.auth.onAuthStateChange(function(event, session){
      if(session && session.user){
        currentUser = session.user;
        userStatus.textContent = "ログイン中：" + currentUser.email;
        loadLogs();
      }
    });

    checkSession();
  </script>
</body>
</html>
