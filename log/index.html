<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Voyage Log – Celeste Harbor</title>
  <meta name="robots" content="noindex, nofollow" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#050811;
      --panel:#111623;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --dim:#747f96;
      --line:#252b3a;
      --accent:#a9b7ff;
      --danger:#ff9b9b;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top,#1a2440 0,#0b1020 34%,var(--bg) 68%),
        linear-gradient(180deg,#050811 0%,#03050b 100%);
      color:var(--text);
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      padding:40px 20px;
    }

    .wrap{
      max-width:760px;
      margin:0 auto;
    }

    .site-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:18px;
      margin-bottom:44px;
      color:var(--muted);
      font-size:13px;
    }

    .brand{
      color:var(--text);
      letter-spacing:.04em;
      text-decoration:none;
    }

    .nav{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }

    .nav a{
      color:var(--muted);
      text-decoration:none;
    }

    .nav a:hover{
      color:var(--text);
    }

    h1{
      font-size:34px;
      font-weight:500;
      line-height:1.7;
      margin:0 0 12px;
    }

    .lead{
      color:var(--muted);
      line-height:2;
      font-size:14px;
      margin-bottom:28px;
    }

    .panel{
      background:rgba(10,14,28,.82);
      border:1px solid rgba(70,84,132,.55);
      border-radius:18px;
      padding:24px;
      box-shadow:0 20px 48px rgba(0,0,0,.42);
      margin-bottom:24px;
    }

    textarea,
    input,
    select{
      width:100%;
      background:rgba(5,8,17,.85);
      border:1px solid rgba(160,168,187,.25);
      color:var(--text);
      border-radius:14px;
      padding:14px;
      font-family:inherit;
      font-size:15px;
      outline:none;
      margin-bottom:10px;
    }

    textarea{
      min-height:180px;
      line-height:1.9;
      resize:vertical;
      margin-bottom:8px;
    }

    textarea:focus,
    input:focus,
    select:focus{
      border-color:rgba(169,183,255,.65);
    }

    select{
      appearance:none;
      cursor:pointer;
    }

    .field-row{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:14px;
      color:var(--dim);
      font-size:12px;
      line-height:1.8;
    }

    .field-note{
      color:var(--dim);
    }

    .char-count.warning{
      color:var(--danger);
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
    }

    button{
      border:0;
      border-radius:999px;
      padding:11px 18px;
      font-family:inherit;
      font-size:14px;
      cursor:pointer;
    }

    .primary{
      background:linear-gradient(135deg,#a9b7ff,#d4dcff);
      color:#050811;
    }

    .ghost{
      background:transparent;
      color:var(--muted);
      border:1px solid var(--line);
    }

    .danger{
      background:transparent;
      color:var(--danger);
      border:1px solid rgba(255,155,155,.38);
    }

    button:hover{
      opacity:.92;
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .status{
      margin-top:16px;
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      min-height:1.8em;
    }

    .status.error{
      color:var(--danger);
    }

    .cat-overlay{
      position:fixed;
      inset:0;
      z-index:40;
      display:none;
      align-items:center;
      justify-content:center;
      padding:22px;
      background:
        radial-gradient(circle at center, rgba(169,183,255,.08), transparent 36%),
        rgba(3,5,11,.46);
      backdrop-filter:blur(3px);
    }

    .cat-overlay.visible{
      display:flex;
    }

    .cat-scroll{
      width:min(680px, 100%);
      position:relative;
      padding:22px 24px 24px;
      border-radius:20px;
      border:1px solid rgba(169,183,255,.32);
      background:
        linear-gradient(180deg, rgba(18,22,36,.96), rgba(8,12,24,.96)),
        radial-gradient(circle at top left, rgba(169,183,255,.14), transparent 36%);
      box-shadow:
        0 28px 80px rgba(0,0,0,.58),
        inset 0 0 0 1px rgba(255,255,255,.025);
      overflow:hidden;
    }

    .cat-scroll::before,
    .cat-scroll::after{
      content:"";
      position:absolute;
      left:22px;
      right:22px;
      height:1px;
      background:linear-gradient(
        to right,
        transparent,
        rgba(169,183,255,.42),
        transparent
      );
    }

    .cat-scroll::before{ top:10px; }
    .cat-scroll::after{ bottom:10px; }

    .cat-scroll-head{
      display:flex;
      align-items:center;
      gap:18px;
      margin-bottom:20px;
    }

    .cat-icon-wrap{
      width:92px;
      height:92px;
      min-width:92px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius:22px;
      border:1px solid rgba(169,183,255,.28);
      background:
        radial-gradient(circle at center, rgba(169,183,255,.10), transparent 62%),
        rgba(255,255,255,.025);
      overflow:hidden;
    }

    .cat-icon{
      width:86px;
      height:86px;
      object-fit:contain;
      display:block;
      filter:
        drop-shadow(0 0 12px rgba(169,183,255,.18))
        drop-shadow(0 10px 22px rgba(0,0,0,.32));
    }

    .cat-icon-wrap.reading{
      animation:catBreath 1.8s ease-in-out infinite;
    }

    @keyframes catBreath{
      0%,100%{
        transform:translateY(0) scale(1);
        opacity:.88;
      }
      50%{
        transform:translateY(-2px) scale(1.035);
        opacity:1;
      }
    }

    .cat-scroll-label{
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:4px;
    }

    .cat-scroll-sub{
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
    }

    .cat-close{
      margin-left:auto;
      width:30px;
      height:30px;
      border-radius:999px;
      border:1px solid rgba(160,168,187,.24);
      background:rgba(255,255,255,.025);
      color:var(--muted);
      font-size:18px;
      line-height:1;
      padding:0;
    }

    .cat-close:hover{
      color:var(--text);
      border-color:rgba(169,183,255,.42);
    }

    .cat-scroll-text{
      white-space:pre-wrap;
      color:var(--text);
      font-size:15px;
      line-height:2.05;
      padding:2px 2px 0;
      opacity:1;
      transform:translateY(0);
      transition:
        opacity .42s ease,
        transform .42s ease;
    }

    .cat-scroll-text.fading{
      opacity:0;
      transform:translateY(4px);
    }

    .user{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      margin-bottom:18px;
    }

    .logs-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:14px;
      margin:28px 0 16px;
      color:var(--muted);
    }

    .logs-title{
      font-size:16px;
      color:var(--text);
      letter-spacing:.04em;
    }

    .logs-count{
      font-size:12px;
      color:var(--dim);
    }

    .log{
      background:rgba(10,14,28,.68);
      border:1px solid rgba(70,84,132,.45);
      border-radius:18px;
      padding:20px;
      margin-bottom:16px;
    }

    .log-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      margin-bottom:12px;
    }

    .date{
      color:var(--muted);
      font-size:12px;
      line-height:1.8;
    }

    .content{
      white-space:pre-wrap;
      line-height:1.9;
      font-size:14px;
    }

    .tag{
      display:inline-block;
      margin-top:14px;
      padding:5px 11px;
      border-radius:999px;
      border:1px solid rgba(160,168,187,.28);
      color:var(--muted);
      font-size:12px;
    }

    .log-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .mini-delete{
      border:1px solid rgba(255,155,155,.28);
      color:var(--danger);
      background:rgba(255,155,155,.025);
      padding:7px 12px;
      font-size:12px;
    }

    .read-more-wrap{
      display:flex;
      justify-content:center;
      margin:20px 0 8px;
    }

    .read-more{
      border:1px solid rgba(169,183,255,.32);
      color:var(--muted);
      background:rgba(255,255,255,.02);
      padding:10px 18px;
      font-size:13px;
    }

    footer{
      margin-top:40px;
      padding-top:18px;
      border-top:1px solid rgba(37,43,58,.9);
      color:var(--muted);
      font-size:12px;
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:14px;
    }

    footer a{
      color:var(--muted);
      text-decoration:none;
    }

    footer a:hover{
      color:var(--text);
    }

    @media(max-width:640px){
      body{
        padding:28px 16px;
      }

      .site-header{
        align-items:flex-start;
        flex-direction:column;
        margin-bottom:34px;
      }

      .nav{
        gap:12px;
        font-size:12px;
      }

      h1{
        font-size:30px;
      }

      .panel{
        padding:20px;
      }

      .cat-overlay{
        align-items:flex-start;
        padding-top:120px;
      }

      .cat-scroll{
        padding:20px;
      }

      .cat-icon-wrap{
        width:78px;
        height:78px;
        min-width:78px;
        border-radius:20px;
      }

      .cat-icon{
        width:72px;
        height:72px;
      }

      .cat-scroll-text{
        font-size:14px;
      }

      .log-top{
        flex-direction:column;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <header class="site-header">
      <a class="brand" href="/">Celeste Harbor</a>

      <nav class="nav">
        <a href="/harbor/">Harbor</a>
        <a href="/log/">Voyage Log</a>
        <a href="/fragments/">Fragments</a>
        <a href="/voyage/">Moonlit Voyage</a>
      </nav>
    </header>

    <main>
      <h1>Voyage Log</h1>

      <p class="lead">
        今日の航海を、静かに残す場所です。<br>
        記録はあなた自身のために保存されます。
      </p>

      <section class="panel">
        <div class="user" id="userStatus">
          ログイン状態を確認しています。
        </div>

        <textarea
          id="content"
          maxlength="1500"
          placeholder="今日の航海を記録する..."
        ></textarea>

        <div class="field-row">
          <div class="field-note">この記録に近い気配を選んでください。</div>
          <div class="char-count" id="charCount">0 / 1500</div>
        </div>

        <select id="tag">
          <option value="Harbor">Harbor（港）</option>
          <option value="Return">Return（帰港）</option>
          <option value="Calm Tide">Calm Tide（静かな潮）</option>
          <option value="Lighthouse">Lighthouse（灯台）</option>
          <option value="Fog">Fog（霧）</option>
          <option value="Drift">Drift（漂流）</option>
          <option value="Moonlit">Moonlit（月夜）</option>
          <option value="Deep Current">Deep Current（深潮）</option>
          <option value="Storm">Storm（嵐）</option>
        </select>

        <div class="actions">
          <button class="primary" id="saveBtn">Save Log</button>
          <button class="ghost" id="loginBtn">Googleでログイン</button>
          <button class="ghost" id="logoutBtn">ログアウト</button>
          <button class="danger" id="deleteAllBtn">全ログ削除</button>
        </div>

        <div class="status" id="status"></div>

        <div class="cat-overlay" id="catOverlay" aria-hidden="true">
          <div class="cat-scroll" role="status" aria-live="polite">
            <div class="cat-scroll-head">
              <div class="cat-icon-wrap" id="catIconWrap" aria-hidden="true">
                <img
                  class="cat-icon"
                  id="catIcon"
                  src="/images/harbor-cat/cat-harbor-main.png"
                  alt=""
                >
              </div>

              <div>
                <div class="cat-scroll-label">Harbor Cat</div>
                <div class="cat-scroll-sub" id="catScrollSub">Harbor Cat が、巻物を読んでいます…</div>
              </div>

              <button class="cat-close" id="catCloseBtn" type="button" aria-label="Close">
                ×
              </button>
            </div>

            <div class="cat-scroll-text" id="catReplyText"></div>
          </div>
        </div>
      </section>

      <section>
        <div class="logs-head">
          <div class="logs-title">Recent Logs</div>
          <div class="logs-count" id="logsCount"></div>
        </div>

        <div id="logs"></div>

        <div class="read-more-wrap" id="readMoreWrap" style="display:none;">
          <button class="read-more" id="readMoreBtn">Read more</button>
        </div>
      </section>
    </main>

    <footer>
      <div>
        <a href="/harbor/">Harbor</a>
        ・
        <a href="/log/">Voyage Log</a>
        ・
        <a href="/fragments/">Fragments</a>
        ・
        <a href="/voyage/">Moonlit Voyage</a>
      </div>
      <div>CELESTE HARBOR</div>
    </footer>

  </div>

  <script>
    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const client = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

    const userStatus = document.getElementById("userStatus");
    const statusEl = document.getElementById("status");
    const saveBtn = document.getElementById("saveBtn");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const deleteAllBtn = document.getElementById("deleteAllBtn");
    const logsEl = document.getElementById("logs");
    const logsCount = document.getElementById("logsCount");
    const readMoreWrap = document.getElementById("readMoreWrap");
    const readMoreBtn = document.getElementById("readMoreBtn");

    const contentEl = document.getElementById("content");
    const tagEl = document.getElementById("tag");
    const charCount = document.getElementById("charCount");

    const catOverlay = document.getElementById("catOverlay");
    const catReplyText = document.getElementById("catReplyText");
    const catIconWrap = document.getElementById("catIconWrap");
    const catIcon = document.getElementById("catIcon");
    const catScrollSub = document.getElementById("catScrollSub");
    const catCloseBtn = document.getElementById("catCloseBtn");

    const maxContentLength = 1500;
    let currentUser = null;
    let currentAccessToken = null;
    let allLogs = [];
    let showAllLogs = false;

    const placeholders = [
      "今日の海は、どんな色でしたか。",
      "まだ言葉にならないものを、少しだけ置いてください。",
      "帰港の前に、ひとつだけ記録するなら。",
      "灯台の光が見えた夜のことを、少しだけ。",
      "今夜、船に残っていたものを記録する..."
    ];

    const catIcons = {
      reading: [
        "/images/harbor-cat/cat-reading-map.png"
      ],
      reply: [
        "/images/harbor-cat/cat-harbor-main.png",
        "/images/harbor-cat/cat-looking-lighthouse.png"
      ],
      fallback: [
        "/images/harbor-cat/cat-looking-lighthouse.png"
      ]
    };

    function pickRandom(items){
      return items[Math.floor(Math.random() * items.length)];
    }

    async function withTimeout(promise, ms, fallbackValue = null){
      let timeoutId;
    
      const timeoutPromise = new Promise(resolve => {
        timeoutId = setTimeout(() => {
          resolve(fallbackValue);
        }, ms);
      });
    
      const result = await Promise.race([
        promise,
        timeoutPromise
      ]);
    
      clearTimeout(timeoutId);
      return result;
    }

    function sleep(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function fadeCatTextTo(message){
      catReplyText.classList.add("fading");

      await sleep(420);

      catReplyText.textContent = message || "";

      requestAnimationFrame(function(){
        catReplyText.classList.remove("fading");
      });

      await sleep(420);
    }

    function setStatus(message, isError = false){
      statusEl.textContent = message || "";
      statusEl.className = isError ? "status error" : "status";
    }

    function accountDisplayName(user){
      if(!user){
        return "Guest";
      }

      return (
        user.user_metadata?.full_name ||
        user.user_metadata?.name ||
        user.user_metadata?.display_name ||
        user.email ||
        "Account"
      );
    }

    function updateCharCount(){
      const length = contentEl.value.length;
      charCount.textContent = length + " / " + maxContentLength;
      charCount.className = length > maxContentLength * 0.9
        ? "char-count warning"
        : "char-count";
    }

    function setPlaceholder(){
      contentEl.placeholder = pickRandom(placeholders);
    }

    function updateAuthUI(){
      const loggedIn = Boolean(currentUser);

      loginBtn.style.display = loggedIn ? "none" : "inline-flex";
      logoutBtn.style.display = loggedIn ? "inline-flex" : "none";
      deleteAllBtn.style.display = loggedIn ? "inline-flex" : "none";

      saveBtn.disabled = !loggedIn;
      tagEl.disabled = !loggedIn;
      contentEl.disabled = !loggedIn;
    }

    function setCatIcon(mode){
      let icons = catIcons.reply;

      if(mode === "reading"){
        icons = catIcons.reading;
      }

      if(mode === "fallback"){
        icons = catIcons.fallback;
      }

      catIcon.src = pickRandom(icons);
    }

    function openCatScroll(message, mode = "reading"){
      catReplyText.textContent = message || "";
      catReplyText.classList.remove("fading");

      catOverlay.classList.add("visible");
      catOverlay.setAttribute("aria-hidden", "false");

      setCatIcon(mode);

      if(mode === "reading"){
        catScrollSub.textContent = "Harbor Cat が、巻物を読んでいます…";
        catIconWrap.classList.add("reading");
      }else{
        catScrollSub.textContent = "港からの静かな返事";
        catIconWrap.classList.remove("reading");
      }
    }

    async function appendCatScrollNotice(message, label = "Harbor Find"){
      const current = catReplyText.textContent.trim();

      const notice = [
        "── " + label + " ──",
        message
      ].join("\n\n");

      const nextText = current
        ? current + "\n\n" + notice
        : notice;

      catOverlay.classList.add("visible");
      catOverlay.setAttribute("aria-hidden", "false");

      catScrollSub.textContent = "港からの静かな返事";
      catIconWrap.classList.remove("reading");

      await fadeCatTextTo(nextText);
    }

    function closeCatScroll(){
      catOverlay.classList.remove("visible");
      catOverlay.setAttribute("aria-hidden", "true");
      catReplyText.textContent = "";
      catReplyText.classList.remove("fading");
      catIconWrap.classList.remove("reading");
    }

    function escapeHtml(str){
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function fetchSupabase(path, options = {}){
      if(!currentAccessToken){
        throw new Error("Missing access token");
      }

      const response = await fetch(
        supabaseUrl + path,
        {
          method: options.method || "GET",
          headers: {
            "apikey": supabaseKey,
            "Authorization": "Bearer " + currentAccessToken,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
          },
          body: options.body ? JSON.stringify(options.body) : undefined
        }
      );

      let result = null;

      try{
        result = await response.json();
      }catch(error){
        result = null;
      }

      if(!response.ok){
        console.error("Supabase fetch error:", result);
        throw new Error((result && result.message) ? result.message : "Supabase request failed");
      }

      return result;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = 8000){
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), timeoutMs);
    
      try{
        const response = await fetch(url, {
          ...options,
          signal: controller.signal
        });
    
        clearTimeout(timeoutId);
        return response;
      }catch(error){
        clearTimeout(timeoutId);
        throw error;
      }
    }

    async function ensureUserVessel(){
      try{
        await fetchSupabase(
          "/rest/v1/rpc/ensure_user_vessel",
          {
            method: "POST",
            body: {}
          }
        );
      }catch(error){
        console.error("ensure_user_vessel error:", error);
      }
    }

    async function checkSession(){
      setStatus("ログイン状態を確認しています。");

      const { data, error } = await client.auth.getSession();

      if(error){
        console.error("getSession error:", error);
        currentUser = null;
        currentAccessToken = null;
        userStatus.textContent = "ログイン状態の確認に失敗しました。";
        setStatus(error.message, true);
        updateAuthUI();
        return;
      }

      if(data.session && data.session.user){
        currentUser = data.session.user;
        currentAccessToken = data.session.access_token;
        userStatus.textContent = "ログイン中：" + accountDisplayName(currentUser);
        setStatus("港へ戻りました。");
        updateAuthUI();

        await ensureUserVessel();
        await loadLogs();
      }else{
        currentUser = null;
        currentAccessToken = null;
        allLogs = [];
        userStatus.textContent = "未ログインです。先にGoogleでログインしてください。";
        setStatus("ログインすると航海記録を保存できます。");
        logsEl.innerHTML = "";
        logsCount.textContent = "";
        readMoreWrap.style.display = "none";
        updateAuthUI();
      }
    }

    async function login(){
      setStatus("Googleログインへ進みます。");

      const { error } = await client.auth.signInWithOAuth({
        provider: "google",
        options: {
          redirectTo: window.location.origin + "/log/",
          queryParams: {
            prompt: "select_account"
          }
        }
      });

      if(error){
        console.error("login error:", error);
        setStatus(error.message, true);
      }
    }

    async function logout(){
      const { error } = await client.auth.signOut();

      if(error){
        console.error("logout error:", error);
        setStatus(error.message, true);
        return;
      }

      currentUser = null;
      currentAccessToken = null;
      allLogs = [];
      showAllLogs = false;
      logsEl.innerHTML = "";
      logsCount.textContent = "";
      readMoreWrap.style.display = "none";
      closeCatScroll();
      userStatus.textContent = "未ログインです。";
      setStatus("ログアウトしました。");
      updateAuthUI();
    }

   async function callCatReply(content, tag){
      try{
        const response = await fetchWithTimeout(
          supabaseUrl + "/functions/v1/cat-reply",
          {
            method: "POST",
            headers: {
              "apikey": supabaseKey,
              "Authorization": "Bearer " + currentAccessToken,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              content,
              tag: tag || "Harbor"
            })
          },
          8000
        );
    
        let data = null;
    
        try{
          data = await response.json();
        }catch(error){
          data = null;
        }
    
        if(!response.ok){
          console.error("cat-reply fetch error:", data);
          return null;
        }
    
        return data?.reply || null;
    
      }catch(error){
        console.error("cat-reply timeout/fetch error:", error);
        return null;
      }
    }

    async function callGrantDriftTicket(){
      try{
        const response = await fetchWithTimeout(
          supabaseUrl + "/functions/v1/grant-drift-ticket",
          {
            method: "POST",
            headers: {
              "apikey": supabaseKey,
              "Authorization": "Bearer " + currentAccessToken,
              "Content-Type": "application/json"
            },
            body: JSON.stringify({})
          },
          8000
        );
    
        let data = null;
    
        try{
          data = await response.json();
        }catch(error){
          data = null;
        }
    
        if(!response.ok){
          console.error("grant-drift-ticket fetch error:", data);
          return null;
        }
    
        return data || null;
    
      }catch(error){
        console.error("grant-drift-ticket timeout/fetch error:", error);
        return null;
      }
    }
    
    async function callGrantHarborFind(tag, context = "voyage_log", force = false){
      try{
        const result = await fetchSupabase(
          "/rest/v1/rpc/grant_random_harbor_find",
          {
            method: "POST",
            body: {
              p_tag: tag || "Harbor",
              p_context: context,
              p_force: force
            }
          }
        );

        return result || null;
      }catch(error){
        console.error("grant_random_harbor_find error:", error);
        return null;
      }
    }

    async function saveLog(){
      setStatus("保存しています。");
      closeCatScroll();
      saveBtn.disabled = true;

      try{
        const content = contentEl.value.trim();
        const tag = tagEl.value || "Harbor";

        if(!currentUser){
          setStatus("先にログインしてください。", true);
          return;
        }

        if(!content){
          setStatus("航海記録が空です。", true);
          return;
        }

        if(content.length > maxContentLength){
          setStatus("航海記録が長すぎます。少し短くしてください。", true);
          return;
        }

        await ensureUserVessel();

        try{
        await fetchSupabase(
          "/rest/v1/voyage_logs",
          {
            method: "POST",
            body: {
              user_id: currentUser.id,
              content: content,
              tag: tag
            }
          }
        );
      }catch(error){
        console.error("insert voyage_logs error:", error);
        setStatus("保存失敗：" + error.message, true);
        return;
      }

        setStatus("航海記録を保存しました。Harbor Cat が、巻物を読んでいます。");

        openCatScroll(
          "Harbor Cat が、巻物を読んでいます…",
          "reading"
        );

        const reply = await callCatReply(content, tag);

        if(reply){
          setCatIcon("reply");
          catScrollSub.textContent = "港からの静かな返事";
          catIconWrap.classList.remove("reading");

          await fadeCatTextTo(reply);
          setStatus("航海記録を保存しました。");
        }else{
          setCatIcon("fallback");
          catScrollSub.textContent = "港からの静かな返事";
          catIconWrap.classList.remove("reading");

          await fadeCatTextTo(
            "港のネコが、灯台の影で小さく耳を動かしているようです。\n航海記録を静かに受け止めました。"
          );

          setStatus("航海記録を保存しました。");
        }

        const harborFindResult = await callGrantHarborFind(tag, "voyage_log", false);

        if(harborFindResult && harborFindResult.hint_message){
          await appendCatScrollNotice(
            harborFindResult.hint_message,
            "漂着の気配"
          );
        }

        if(harborFindResult && harborFindResult.found){
          await appendCatScrollNotice(
            harborFindResult.message ||
              "今夜、港に小さな漂着物が流れ着きました。",
            "Harbor Find"
          );

          setStatus("航海記録を保存しました。港に漂着物が届きました。");
        }

        const driftResult = await callGrantDriftTicket();

        if(driftResult && driftResult.granted){
          await appendCatScrollNotice(
            driftResult.message ||
              "今夜、港に小さな航海券が漂着しました。\n5分だけ、少し深い海へ降りられます。",
            "Drift Ticket"
          );

          setStatus("航海記録を保存しました。漂着チケットが届きました。");
        }

        contentEl.value = "";
        tagEl.value = "Harbor";
        updateCharCount();
        showAllLogs = false;

        await loadLogs();

      }catch(error){
        console.error("saveLog catch:", error);
        setStatus("保存処理でエラーが発生しました：" + error.message, true);
      }finally{
        updateAuthUI();
      }
    }

    async function loadLogs(){
      if(!currentUser){
        return;
      }

      const { data, error } = await client
        .from("voyage_logs")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("created_at", { ascending:false });

      if(error){
        console.error("load error:", error);
        setStatus("読み込み失敗：" + error.message, true);
        return;
      }

      allLogs = data || [];
      renderLogs();
    }

    function renderLogs(){
      logsEl.innerHTML = "";

      logsCount.textContent = allLogs.length
        ? allLogs.length + " logs"
        : "";

      if(!allLogs || allLogs.length === 0){
        logsEl.innerHTML = `
          <div class="log">
            <div class="content">まだ航海記録はありません。</div>
          </div>
        `;
        readMoreWrap.style.display = "none";
        return;
      }

      const visibleLogs = showAllLogs ? allLogs : allLogs.slice(0, 3);

      visibleLogs.forEach(log => {
        const div = document.createElement("div");
        div.className = "log";

        const date = new Date(log.created_at).toLocaleString("ja-JP");

        div.innerHTML = `
          <div class="log-top">
            <div class="date">${escapeHtml(date)}</div>
            <div class="log-actions">
              <button class="mini-delete" data-delete-id="${escapeHtml(log.id)}">
                削除
              </button>
            </div>
          </div>

          <div class="content">${escapeHtml(log.content)}</div>
          <div class="tag">#${escapeHtml(log.tag || "Harbor")}</div>
        `;

        logsEl.appendChild(div);
      });

      if(allLogs.length > 3){
        readMoreWrap.style.display = "flex";
        readMoreBtn.textContent = showAllLogs
          ? "Show less"
          : "Read more";
      }else{
        readMoreWrap.style.display = "none";
      }
    }

    async function deleteLog(logId){
      if(!currentUser || !logId){
        return;
      }

      const ok = confirm("この航海記録を削除します。\nこの操作は元に戻せません。");

      if(!ok){
        return;
      }

      setStatus("削除しています。");

      const { error } = await client
        .from("voyage_logs")
        .delete()
        .eq("id", logId)
        .eq("user_id", currentUser.id);

      if(error){
        console.error("delete error:", error);
        setStatus("削除失敗：" + error.message, true);
        return;
      }

      setStatus("航海記録を削除しました。");
      await loadLogs();
    }

    async function deleteAllLogs(){
      if(!currentUser){
        return;
      }

      if(!allLogs || allLogs.length === 0){
        setStatus("削除する航海記録はありません。");
        return;
      }

      const ok = confirm(
        "すべての航海記録を削除します。\nこの操作は元に戻せません。"
      );

      if(!ok){
        return;
      }

      setStatus("すべての航海記録を削除しています。");

      const { error } = await client
        .from("voyage_logs")
        .delete()
        .eq("user_id", currentUser.id);

      if(error){
        console.error("delete all error:", error);
        setStatus("全削除失敗：" + error.message, true);
        return;
      }

      allLogs = [];
      showAllLogs = false;
      renderLogs();
      setStatus("すべての航海記録を削除しました。");
    }

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);
    saveBtn.addEventListener("click", saveLog);
    deleteAllBtn.addEventListener("click", deleteAllLogs);

    readMoreBtn.addEventListener("click", function(){
      showAllLogs = !showAllLogs;
      renderLogs();
    });

    logsEl.addEventListener("click", function(event){
      const button = event.target.closest("[data-delete-id]");
      if(!button){
        return;
      }

      deleteLog(button.dataset.deleteId);
    });

    catCloseBtn.addEventListener("click", closeCatScroll);

    catOverlay.addEventListener("click", function(event){
      if(event.target === catOverlay){
        closeCatScroll();
      }
    });

    contentEl.addEventListener("input", updateCharCount);

    client.auth.onAuthStateChange(async function(event, session){
      if(session && session.user){
        currentUser = session.user;
        currentAccessToken = session.access_token;
        userStatus.textContent = "ログイン中：" + accountDisplayName(currentUser);
        updateAuthUI();

        await ensureUserVessel();
        await loadLogs();
      }else if(event === "SIGNED_OUT"){
        currentUser = null;
        currentAccessToken = null;
        updateAuthUI();
      }
    });

    setPlaceholder();
    updateCharCount();
    updateAuthUI();
    checkSession();
  </script>
</body>
</html>
