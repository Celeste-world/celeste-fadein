<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>港の入口 – Celeste Harbor</title>
  <meta name="robots" content="noindex, nofollow" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">

  <style>
    :root{
      --bg:#050811;
      --text:#e8ebef;
      --muted:#a0a8bb;
      --accent:#a9b7ff;
      --danger:#ff9b9b;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top,#1a2440 0,#0b1020 34%,var(--bg) 68%),
        linear-gradient(180deg,#050811 0%,#03050b 100%);
      color:var(--text);
      font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .panel{
      width:min(520px,100%);
      background:rgba(10,14,28,.82);
      border:1px solid rgba(70,84,132,.55);
      border-radius:20px;
      padding:28px;
      box-shadow:0 20px 48px rgba(0,0,0,.42);
      text-align:center;
    }

    .label{
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:var(--accent);
      margin-bottom:18px;
    }

    h1{
      font-size:26px;
      line-height:1.8;
      font-weight:500;
      margin:0 0 16px;
    }

    .status{
      color:var(--muted);
      font-size:14px;
      line-height:2;
      min-height:2em;
    }

    .status.error{
      color:var(--danger);
    }

    a{
      color:var(--accent);
      text-decoration:none;
    }

    a:hover{
      color:var(--text);
    }
  </style>
</head>

<body>
  <section class="panel">
    <div class="label">Celeste Harbor</div>

    <h1>
      港の入口を<br>
      確認しています。
    </h1>

    <div class="status" id="status">
      ログイン状態を確認しています。
    </div>
  </section>

  <script>
    const supabaseUrl = "https://okpsmmtdjtgrjxxocgrs.supabase.co";
    const supabaseKey = "sb_publishable_VD2CoAoDJPLq2SPje9rs9Q_kuqa5EdO";

    const client = window.supabase.createClient(
      supabaseUrl,
      supabaseKey
    );

    const statusEl = document.getElementById("status");

    function setStatus(message, isError = false){
      statusEl.textContent = message || "";
      statusEl.className = isError ? "status error" : "status";
    }

    async function checkSession(){
      const { data, error } = await client.auth.getSession();

      if(error){
        console.error("getSession error:", error);
        setStatus("ログイン状態を確認できませんでした。", true);

        setTimeout(function(){
          window.location.replace("/");
        }, 600);

        return;
      }

      if(data.session && data.session.user){
        setStatus("港へ入ります。");

        window.location.replace("/log/");
        return;
      }

      setStatus("ログインが必要です。入口へ戻ります。");

      window.location.replace("/");
    }

    client.auth.onAuthStateChange(function(event, session){
      if(session && session.user){
        window.location.replace("/log/");
      }else if(event === "SIGNED_OUT"){
        window.location.replace("/");
      }
    });

    checkSession();
  </script>
</body>
</html>
